纒寳明齊映落華生烟鎮固上元映照我身三宫保錬六府光津䇿御八景玄老周旋乗空歩虚出入無間上輔髙上虚皇帝臣八㑹慶納請如所陳畢仰嚥九氣止此髙上祕道變化混生知者與髙上齊真修之九年飛行玉清輕泄七祖充責身役河源依九天之科不得入仙紫虚髙上元皇道君元明皇之氣諱明上基字飛冥範形長五千萬丈以春三月頭建紫元通天寳冠衣青黄緑三色錦袍佩招真玉䇿帶流光鳯章常乗紫碧二色之雲坐十二色蓮華之上光明暐曄在上清之中紫虚之内思之還長五寸五分夏三月髙上元皇道君則變形色如黄金項負圓輪十二光衣七十二條九綵飛天之衣坐九色師子之上思之還反真形秋三月髙上元皇道君則變形爲鳯頭人軀衣九色斑文虎衣坐五色雲上思之還反真形冬三月髙上元皇道君則變形爲碧皂黄三色之光更相纒繞在紫虚之中此則反明皇之氣更受錬紫虚之精思之還反真形修行髙上元皇之道當以太𡻕之日沐浴入室南向心拜三過朝元皇畢還北向叩齒十二通閉眼内思髙上元皇道君隨四時形影在上清金靈宫丹神府元洞郷通耀里廻真下映入兆通神之戸便㣲祝曰明皇元道髙上紫元三變九合結成洞門朱精爛綺飛生黄雲五符固死保命長存廻真混合使我成神三宫安鎮九孔結仙四時變化與帝合真畢仰嚥九氣止此髙上祕宻之道三變九錬自然成真得行其法九年飛行與神合形輕泄漏慢九祖充責身没幽泉長謝四極不得入仙上皇玉虚君元紫皇之氣諱明世蘭字曲常清形長三千萬丈以夏三月頭建通精七寳華冠衣九色飛雲錦䙱佩丹文紫章常立紫氣之雲七色蓮華光明暐曄洞照上清思之還長三寸三分秋三月上皇玉虚君則變形一靣四眼身爲鳯軀九色斕斑在黄白紅三氣之中立五色師子之上思之還反真形冬三月上皇玉虚君則變形爲男子手執五色之華衣五色之衣在紫雲芝之上思之還反真形春三月上皇玉虚君則變形爲黄赤青三色之光混沌狀如浮雲在紫虚之内此則上皇反玉虚之氣更受錬紫皇之精思之還反真形凡修行玉虚君之道當以八節之日清齋東向三拜朝玉虚畢還北向叩齒三通閉眼内思上虚皇玉君隨四時形影在上清朱精宫生真府太丹郷三寳里廻真下映入兆泥丸後門之中便㣲祝曰玄明紫皇八氣飛空幽幽冥冥混化十方敷靈演真煥曜金光紫㣲錬精結成仙容八景騰飛乗雲駕空控轡太虚逍遥上宫畢仰嚥七氣止此上皇金匱祕道有名書紫簡刻圖丹臺當得此文修行九年飛行上清輕泄祕要身没鬼官不得入仙三元太明上皇君元虚皇之氣諱寂欣平字靈刼化形長七千萬丈秋三月頭建丹華紫曜飛天冠衣五色雲羅之袍佩流金火鈴帶神虎玉章常立紫雲之上光明暐曄七十二變照明上清思之還長七寸二分太明上皇君以冬三月則化形人頭龍身五色玄黄在紫虚之上立九色雲光絶空之中思之還反真形太明上皇君以春三月則化形爲三月之暉流光爓照上清之中紫虚之内思之還反真形太明上皇君以夏三月則化形爲赤白二色之光如太素之雲在紫虚之中此則太明上皇君反三元之氣更受錬虚皇之精思之還反真形修行上皇君之道常以本命太𡻕之日沐浴入室南向心拜太明上皇君畢還北向叩齒三通閉眼思太明上皇君隨四時形影在上清紫融宫生真府七相郷六元里中廻真下映入兆左方融生宫中便微祝曰三元太明洞景朱靈玄氣散真混合元精帝一變化保命黄寧八氣飛騰六宫常生玄老同符我道已明三光翼景羽服欝青䇿轡丹輿飛入月庭畢仰嚥十二氣止得修此道則名書九天上真降席飛行玉清輕慢泄漏身没鬼官不得入仙皇上萬始先生元上皇之氣諱幽朗蘭字通大範形長九千萬丈冬三月頭建丹陽日精之冠衣赤雲明光錦袍佩金虎鳯丈帶丹皇紫章常乗白素之雲坐五色師子光明流煥照映上清思之還長二寸一分春三月萬始先生則變形爲人軀三頭鳯凰衣九色斑文虎衣常立十二華光思之還反真形夏三月萬始先生則變形爲三日之暉紫光八芒爛映煥明在上清之上十二色蓮華之中思之還反真形秋三月萬始先生則化爲青赤紫三色之光更相纒繞如日之輪此則反皇上之氣更受錬上皇之精思之還反真形修行萬始先生之道常以本命八節之日沐浴入室北向心拜先生畢叩齒三通閉眼思先生随四時形影在上清融華宫金魂府明靈郷上張里中廻真下映入兆右方隂極宫中微祝曰萬始三精散氣九微上景登正明道四飛玄母開願八間觧懐保録中元帝真徘徊變化三形體無常衰混合光象日月齊暉飛登玄宫昇入紫微畢仰嚥九氣止此髙玄妙祕黄房寳文得見其篇書名九天修行飛仙白日昇天上皇先生紫晨君元髙元之氣諱欣平淵字道元極身長九千萬丈春三月建通天寳晨冠衣七色流明雲光珠袍佩上相制靈之符帶混眞東䝉之䇿坐九色蒼龍在青雲之上光明流曜洞照上清思之還化九寸九分夏三月化形龍頭人身五色斑斕文彩煥曜在紫雲之中光明徹照映朗十方思之還反眞形秋三月化形人頭龍身九色斑斕文彩光明洞照上清思之還反眞形冬三月化形青黒二色之光更相混合光明洞曜映照上清此則反上皇之氣更受錬元髙元之精思之還反真形修行紫晨君之道常以立春之日東向九拜朝紫晨君畢還向叩齒九通思紫晨君隨四時形影在玉清紫玄上宫朱映府金精郷化靈里中廻眞下映入兆肝之上門微祝曰上皇散靈紫晨納精三華洞發四度鮮明流真交慶廻映我庭三元混合我道以成仙衣羽服錦裳飛青九龍䇿轡飛行上靈仰嚥九氣止紫虚皇上太帝君元洞元之氣諱靈明谷字大範宗長八千萬丈夏三月建九氣流精紫曜之冠衣九色無縫自然之䙱佩七元交光之章帶元皇命真之䇿坐神鳯之上絳雲之内光明暐曄洞照上清思之還長八寸八分秋三月化形鳯頭人形九色斑斕文彩光明蓮華之上在素雲之中思之還反真形冬三月化形人頭鳯身口衘火鈴文彩煥爛洞照上清思之還反真形春三月化形爲青赤二色之光光明赫赫照明上清此則反紫虚之氣更受錬元洞精之精思之還反真形修行太帝君之道常以立夏之日入室南向八拜朝太帝君還北向叩齒九通思太帝君隨四時形影在玉清變雲宫中丹曜府金華郷日精里中廻真下映入兆心房上關微祝曰紫虚吐精皇上納氣二元交慶混合齊契流津濯灌澤灑九外是日上吉我享元㤗玉華流溢洗塵掃穢六腑開清身無毫翳明道八景輔成仙位仰嚥靈芝還童反艾肉輕骨飛昇入無際仰嚥八氣止紫虚皇老上帝君元洞精之氣諱虚盈字元衡豁長六千萬丈秋三月建金華七曜之冠衣雲文日精錦袍佩皇天仗幡帶九光靈章綬立素雲之中坐七色師子光明流煥洞映上清思之還長六寸六分冬三月化形虎頭人身黄白錦袍文彩明曜立玄雲之中坐九色靈照十方思之還反眞形春三月化形人頭虎身九色斑斕光彩煥煥照明上清在紫虚上清之中思之還反真形夏三月化形爲赤白二色之光光明奕奕照明四方此則反紫虚之氣更受錬元洞之精思之還反真形修行上帝君之道常以立秋之日入室西向六拜朝帝君畢還北向叩齒十二通思上帝君隨四時形影在玉清金門宫治精府三錬郷九變里中廻真下映入兆胇宫中節間微祝曰皇老開張四運改靈錬度三關變化飾形是日慶合萬氣交并太上度符司命典生削㓕死根勒録上清上享元吉靡不利貞夀同三光與眞齊靈得乗飛景上造帝庭畢仰嚥十二氣止玄虚太眞洞景君元洞融之氣諱遊上飛字玄開梁化五千萬丈冬三月建無上七曜寳冠衣朱玉文明光飛錦䙱佩丹皇玉章帶招仙之劒在玄虚之中立五色師子之上光明煥曜映照上清思之還長五寸五分春三月化形爲仙人色如金剛項負寳圎衣龜文大衣光照十方在青雲之中思之還反真形夏三月化形爲靈龜三百六十文章口衘七星坐華盖之下玄雲之上光明奕奕照映上清思之還反真形秋三月化形爲白黒二色之光光色沌沌如玉之精此則反玄虚之氣更受錬元洞融之精思之還反真形修行洞景君之道常以立冬之日入室北向五拜朝洞景君叩齒三通思洞景君在玉清瓊容宫太丹府朱雀郷崖中里中廻真下映入兆腎府𩀱闕之内微祝曰洞真髙清四運錬仙道合中元變化自然流津玄灑慶布我身上享元吉利貞受恩太一度符元君科山絶㓕死屍斬断胞根八景輔翼緫録萬神降致雲輿運我昇晨畢仰嚥五氣止行之八年刻得玄昇中真降見授兆真經寳章皇上玉帝元髙晨之氣諱大寧字大幽始長三千萬丈春三月建七寳珠冠衣九色虎衣佩金虎鳯文帶神虎玉章乗七元之精立朱雀之上十二華光煥明玉清洞虚之中思之還化三寸三分夏三月化形項負七色寳盖两手斗星立日暉之中光明暐曄在上清之上思之還反真形秋三月化形人頭爲朱雀口衘日象立紫雲之上華盖之下光明奕奕映照上清思之還反真形冬三月化形爲玄黄蒼三色之光更相纒繞在紫虚之中則玉帝反皇上之氣更受錬髙晨之精思之還反真形修行玉帝之道常以月一日十五日沐浴入室東向心拜朝玉帝畢還北向叩齒十二通閉眼思皇上玉帝隨四時形影在上清洞雲宫霧仙府仙變郷定微里中廻真下映入兆兩眉中間微祝曰明上帝皇騰景髙微九變紫元四氣錬暉三合中宫五化徘徊混合帝一萬氣緫歸安靈元室鎮固九扉三部八景齊真相隨共乗雲龍昇我髙飛長享帝籍億億不衰仰嚥九氣止此皇上之道紫房中祕言授於金名玉字合真之人得者飛仙與帝合形輕泄身死七祖充責萬刼不得入仙太素髙虚上極紫皇君元明晨之氣諱宗梵憐字玄上門化五千萬丈夏三月建天元七寳冠衣九色珠絳雲光錦䙱佩六山火玉帶靈飛紫綬立五色師子蓮華之上煥明上清七十四方思之還長五寸二分秋三月化形人頭虎軀玄黄斑文文彩煥爛光照十方在紫氣之中立五芝之上思之還反真形冬三月化形通身金光項負華盖衣三十二色有如天仙之象光明奕奕照朗上清思之還反真形春三月化形爲紫黄緑三色之光更相纏繞三氣混沌在上清之中此則紫皇反太素之氣更受錬明晨之精思之還反真形修行紫皇君之道常以庚申之日清齋入室南向心拜紫皇君畢還北向叩齒三通閉眼思紫皇道君隨四時形影在上清金耀宫紫曜府七元郷華盖里中廻真下映入兆紫房宫中微祝曰明晨散靈紫皇納暉太素九變四錬洞㣲太一監命公子保衰帝君理命三元齊廻與真并契福祚巍巍策龍飛昇上造雲扉畢仰嚥九氣止此金房祕要傳上清真人得者飛仙位齊髙真輕泄漏慢身役河源七祖謝責不得入仙虚明紫蘭中元髙嵉君元太晨之氣諱惠智字通大業長三千萬丈秋三月建三華寳冠衣神精七色之袍帶流金紫章佩石精金光之劒立碧霞之上七色虎輦光明煥煥三十二色思之還長三寸三分冬三月化形虎身龍頭五色斑文光明奕奕在碧雲之中五色蓮華之上思之還反真形春三月變形三頭鳯皇九色文彩光明煥爛照映上清思之還反真形夏三月化形爲紫碧二色之光更相纏繞如日之昇此則髙嵉君紫蘭之氣更受錬元明太晨之精思之還反真形修行中元髙嵉君之道常以立秋之日清齋入室西向拜朝髙嵉君畢還北向叩齒十二通閉眼思髙嵉君隨四時形影在上清靈映宫神變府三輪郷成真里中廻真下映入兆五藏五城之宫微祝曰太晨廻景虚明分變合九錬三真輪津靈灌漑五城門鎮神固氣塞死源上招髙虚致仙群飛行羽歩昇金門世享帝席命長全七葉同歡離五根畢仰嚥三氣止此紫蘭寳訣萬刼一宣得者飛行上昇玉清紫虚玉皇先生紫晨君元玉晨之氣諱靈㑹淯字度衆光長七千萬丈冬三月建七寳飛華冠衣九色紫錦華帬佩龍景七變虎符立五色師子之上十二華光明照十方思之還長七寸七分春三月化形爲九色之鳯口衘素綬文身斑斕光耀上清思之還反真形夏三月化形人軀九頭之鳥九色文彩光明暐曄映照上清思之還反真形秋三月化形爲紫蒼赤三色之光混沌相繞如雲之交此則紫晨君反紫虚玉皇之氣更受錬玉晨之精思之還反真形修行紫晨君之道常以太𡻕之日清齋入室北向心拜朝紫晨君叩齒三通閉眼思紫晨君隨四時形影在上清變光宫九合府自然郷永康里中迴真下映人兆左腋下㣲祝曰九玄生紫晨皇景發瓊華三錬洞神府七入金離沙吐納餐童陽含漱引日葩四攺隨運生妙景保朱霞有能明此訣𢹂手歩北阿畢仰嚥七氣止此金房寳文得修真道飛行玉清紫虚三元紫精元君紫晨之氣諱明上耀字朋大光長九千萬丈春三月建九元飛晨嬰冠衣丹錦飛帬佩九天龍文虎書帶日精育延之劒立五色蓮華之上項負七寳之光思之還長九寸九分夏三月紫精君化形爲童子頽雲角髻衣五色彩衣手執華幢光明煥爛照映上清思之還反真形秋三月化形龍頭蛇軀青黄煥爛光曜玉虚思之還反真形冬三月化形爲紫青白三色之光沌沌如日月之暉此則反紫虚三元之氣更受錬紫晨之精思之還反真形修行紫精君之道常以春分之日清齋入室東向心拜朝紫精君畢還北向叩齒十二通閉眼思紫精君隨四時形影在上清玉寳宫洞靈府金相郷昇樂里中廻真下映入兆心房之中微祝曰紫霄散朱靈丹霄煥玉清三元踊飛盖徘徊紫階庭反我自然氣受錬瑩玉形飬味月中水仰吸朱日精三華齊明景䇿氣迅八軿畢仰嚥七氣止此九天祕祝玉房寳文得行其道飛騰玉清輕泄漏慢身役河源不得入仙真陽九老玄一君元洞晨之氣諱明流爓字宣通勃長五千萬丈夏三月建寳晨通精冠衣九色雲文錦袍佩太上命神之章龍景丹文立紫雲之上坐七色蓮華光明煥煥思之還長五寸五分秋三月化形爲嬰兒坐紫虚之中戴五色華盖把五芝華幡思之還反真形冬三月化形爲月光青色欎欎在紫雲之中青華之上光明流照洞映上清思之還反真形春三月化形爲青緑玄三色之光混沌相纏如雲之交欎勃上清之中此則反真陽元老之氣更受錬元洞晨之精思之還反真形修元老玄一之道常以立夏之日清齋入室西向三拜朝元老畢還北向平坐叩齒十二通思元老玄一君隨四時形影在上清飛玄宫洞太府九元郷三開里中廻真下映入兆命門之外微祝曰洞晨錬真陽玄老乗虚發四化變妙根雲景曜朗月迅虚亭丹衢䇿轡之朱律曲引冥郷交同集九靈闕微哉保刼功誰測浮與没畢仰嚥九過止有知玄一四時變化修之九年則見真形下降寢房能變形太虚飛行上清太微大帝君元洞元之氣諱大崇屬字元洞度長三千萬丈秋三月建九元飛嬰冠衣七色鳯雲之袍帶夜光寳章交靈素綬立五色師子之上身生三十二色寳光在上清之上思之還長三寸二分冬三月化形爲無量真人身負金光照明十方立九色之華手執金鈴思之還反真形春三月化形爲日光紫芒煥映玉虚之上照明十方思之還反真形夏三月化形爲白蒼緑三色光更相纏繞如雲之沓此則帝君反太㣲之氣更受錬洞元之精思之還反真形修天帝君之道常以春分之日沐浴入室東向再拜朝帝君畢還北向平坐叩齒三通思帝君隨四時形影在上清雲霞宫八朗府三真郷五晨里中迴真下映入兆右腋下㣲祝曰洞源變靈九色明鮮迴合太㣲四化成真玉虚欎勃景曜朱煙含華漱泉飛芳八纒仰餐流暉錬灌我身我身變化昇入九天上書仙籍與帝結縁畢仰嚥九過止有知帝君四時之變夀同三光修行其道飛行上清輕泄漏慢七祖充責青靈陽安君元洞浩之氣諱度衆法字大開明長五千萬丈冬三月建三精芙蓉晨冠衣雲文丹錦飛裘履九色師子佩流金火鈴交帶七元身生七變之光暐曄玉清之上細㣲之内思之還長三寸三分春三月化形爲老公頭戴飛龍口衘月身衣羽衣手持紫綬在丹霞之上照明玉清思之還反真形夏三月化形爲虎頭人身五色斑斕光照十方思之還反真形秋三月化形爲黄緑紫三色之光混沌上清如日之暉此則反青靈之氣更受錬洞浩之精思之還反真形修行陽安君之道常以立春之日沐浴入室東向再拜朝陽安君畢還北向叩齒九通思陽安君隨四時形影在上清招揺宫六合府廣靈郷洞泉里中迴真下映入兆兩丸之間車軸下戸㣲祝曰洞浩峙五華神暉灌青靈混合帝一氣變化隨運生通朗始神堂發幽錬丹形玄玄九元内寥寥中有精真景䊮雲宫奕奕照三清迴映細㣲中表爾形與名氣入神寂房迴宴紫霄軿畢嚥氣三過止有知陽安四化之形夀同天地修之九年白日飛行上元太素三元君元晨華之氣諱雲育瑛字勃芝長三千萬丈春三月建寳玄扶晨羽冠服紫氣浮雲錦帔九色龍錦羽裙腰帶流金火鈴虎符龍書坐於太空之中膝下常有丹緑青三素之雲光明暐曄映照十方在九天之上細㣲之内思之還長七寸夏三月化形一身三頭戴七稱寳冠服三素飛雲錦衣立九色鳯凰上照十方思之還反真形秋三月化形為七曜華精玉光暐曄紫雲之上光色欎欎如日之暉思之還反真形冬三月化形為紫白黄色之光蓊蓊勃勃如金之精此則反上元太素之氣更受錬晨華之精思之還反真形修行三元之道常以本命太𡻕之日沐浴入室西向三拜朝三元君畢還北向平坐叩齒九通思三元君隨四時形影在上清寳素宫九玄府晨華鄉玉皇里中廻眞下映入兆九孔之户㣲祝曰三素迴天元流霄翼玉靈靡靡乗玄散飄飄虚上清把我自然運攺化豈常名妙覺始玄旦欣我萬劫齡太霞雖云遼洞映監有情相與携玉契同期九天軿畢嚥三氣止此紫元六合宫中祕道有知三元四時之化不死修行其道飛行上清髙上太素君元洞觀之氣諱寳洞通字明世宗化三千萬丈夏三月頭建紫元寳冠衣丹錦七色之䙱佩豁落七曜元章帶三寳招仙之䇿立五色蓮華之上光明煥照思之還長七寸秋三月太素君則變形龍頭人身五色斑斕光明流曜映照十方思之還反真形冬三月太素君則變形三目之象光映混沌照明上清思之還反真形春三月太素君則變形蒼白二色之光奕奕在元氣之中紫霄之上此則反髙上太素之氣更受錬元洞觀之精思之還反真形修行太素君之道常以甲子日沐浴入室西北向再拜朝太素君畢還北向平坐叩齒三通思太素君隨四時形影在上清無量宫映天府七相郷九轉里中廻真下映入兆背中骨節之府微祝曰太素䇿運四景虚飛通精散氣錬變紫暉三寳華盖緑軿徘徊流映霞庭光曜髙㣲來變我神生我羽衣輕翔毛服八氣齊飛畢嚥氣八過止知太素隨四時之變則夀萬年修行其道飛行上清輕泄靈文身死失仙上清紫精三素君洞元陽之氣諱霄華字法靈曜長七千萬丈秋三月頭建通精晨冠衣五色斑文虎衣佩交靈素綬帶招仙之劒立九色師子之上項生圎光照明上清思之還長七寸冬三月紫精三素元君則變形為鳯頭人身衣蒼碧紫三色羽衣光明流煥上清之中思之還反真形春三月紫精三素元君則變形人頭龍身文彩煥曜照明上清思之還反真形夏三月紫精三素元君則變形為黄黒二色之光混沌相纒如雲之昇此則反紫精之氣更受錬洞陽之精思之還反真形修行三元君之道常以庚申之日沐浴入室西向再拜朝元君畢還北向平坐叩齒三通思元君隨四時形影在上清玉皇宫寳雲府三氣郷交靈里中廻真下映入兆大搥骨首之户便㣲祝曰紫精散景暉變錬九氣庭方圎三便府離合攺運生吐津灌日根皇華曜紫清尋我髙上道㣲中有至靈誰能廻我輿與爾結玄名畢嚥氣三過止有知此道三素降真形修行九年飛行上清皇清洞真君元明皓靈之氣諱元寳琮字理玄𧷤長五千萬丈冬三月冠三梁玉晨之冠衣七色虎文之裘帶流金火鈐七色仗幡立三素飛雲之上光明暐曄玉虚之内思之還長五寸五分春三月洞真君變形頭巾黄巾衣四十二條法衣手執華幡在紫雲之上思之還反真形夏三月洞真君則變形冥目閉視頭戴華盖足履蓮華思之還反真形秋三月洞真君則變形為黄白二色之光光明流煥在太空之中照明十天此則反皇清之氣更受錬明皓靈之精思之還反眞形修行洞真君之道以立冬之日沐浴入室北向三拜朝洞真君畢還北向平坐叩齒十二通思洞真君隨四時形影在上清洞玄宫清㣲府玉相郷金嬰里中廻真下映入兆口之四際中㣲祝曰皇清摽晨暉靈氣翼虚遷飄飄九元上靡靡入帝晨仰吸月中水俯引日華根洞錬廣靈氣流芳灌我真乗運尋帝景意合致玉仙畢嚥氣七過止有知洞真四變之道三年則與神交言修行九年飛行玉清皇上四老道中君元洞虚之氣諱鏡際字浩元長七千萬丈春三月頭建明真七寳玉冠衣鳯文斑袍佩豁落流鈴帶招真之劒立于九色師子之上十二華光在上清之上紫虚之中思之還長七寸夏三月道中君則變形為小兒衣五彩之衣口衘七星立白雲之上思之還反真形秋三月道中君則變形為人頭蛇身五色斑斕在玉虚之上思之還反真形冬三月道中君則變形為青赤白三色之雲更相纒繞在玄空之中此則反皇上之氣更受錬洞虚之精思之還反真形修行道中君之道常以冬至日沐浴入室東南向四拜朝道中君畢還北向平坐叩齒十二通思道中君隨四時形影在上清流精宫㑹明府太仙郷三清里中迴真下映入兆背窮骨地户㣲祝曰四老中真散華雲房迴景四陳變化八方吐納三精流映我宫仙魂仙魄髓結玉容乗虚䇿霄飛入太空畢嚥氣四過止有知道中君四變之道夀享萬年修行致神降白日昇天玉晨太上大道君元虚靈之氣諱嚚獻字波苦淵長九千萬丈秋三月頭建百變神光玉冠披飛森霜珠之袍七色虎衣佩九色離羅之章帶晨光月明之鈴坐七色之雲光明流曜上清之中思之還長九寸冬三月太上道君則變形頭戴七光圎輪身著三十二色法衣立九色師子之上光明暐曜在上清之上太㣲之中思之還反真形春三月太上大道君變形為老子頭戴角巾身著虎文之衣手執金符在五芝華上思之還反真形夏三月太上大道君變形為紫黄二色之光光明奕奕更相纏繞在紫虚之中反玉晨之氣更受錬虚靈之精思之還反真形修行大道君之道常以八節本命之日沐浴入室北向再拜朝玉晨君畢還北向平坐叩齒九通思玉晨君隨四時形影在上清蘂珠宫日闕府紫映郷金光里中迴真下映入兆頸外十二間梁之中微祝曰玉晨帶髙靈緫眞御八清玉華披丹房紫鳯曜雲營𢹂致玄都眞同錬朱丹精隨化變五神營暉明上靈元道無窮方㣲我妙有生命仙度符籍表爾形與名畢仰嚥五氣止此髙上玉篇知者夀萬年修之九年飛昇上清輕泄至妙身死不仙中央黄老君元五暉之氣諱無英生字雲九夜長三千萬丈夏三月頭建寳琅晨冠衣九色雲文裘帶交靈紫綬十二色華光常立五色師子之上光明流曜上清之中思之還長三寸三分秋三月中央黄老君則變形為玉童頭戴七精之華衣飛天羽衣手執華幡思之還反真形冬三月中央黄老君則變形為大仙通身黄金色衣七色衣項負圎光足履蓮華光明流煥思之還反真形春三月中央黄老君則變形爲紫緑青二色之光更相纏繞在玉虚之上此則反中央之氣更受