上清思之還反眞形冬三月東明虚皇君則變形為黒青二色之光光色欝欝洞照上清此則反東明之氣更受練明皇之精思之還反眞形修行東明之道當以立春之日入室東向九拜朝虚皇君畢還北向叩齒九通思虚皇隨四時形影在玉清紫㣲宫朱雀府南陽郷洞生里中迴眞下映入兆肝内九重之户便祝曰東明敷散九精發暉髙上玄映青真洞迴四氣交灌練仙人飛流精曲降朗明重暉内府鎮神外關固衰變化八景洞盻幽㣲長享天靈福祚巍巍畢仰嚥九氣止行此九年則上眞曲映授兆青精玉芝雲瓊坐觀九天剋成上仙中元中舍虚皇君元泰皇之氣形長三千萬丈四季之月頭䢖天元七寳冠衣五色流黄之䙱佩六山火玉帶神精交蛇之綬坐黄雲之上五色獅子光明煥爛照明五方思之還長三寸三分冬水王之時中舍虚皇君則變形一身五頭頭戴五星身衣五色羽衣手執五色華幡在五色雲氣之上洞照上清思之還反真形春木王之時中舍虚皇君則變形為童子衣五色之衣手御黄龍在黄雲之中立七星之上光明清曜洞照五方思之還反真形夏火王之時中舍虛皇君則變形為五色之光更相混沓照明五方此則反中舍中元之氣更受錬元泰皇之精思之還反眞形修行中舍虛皇君之道當以太嵗本命之日入室隨王十二拜朝之虛皇君畢還北向叩齒十二通思虛皇君隨四時形影在玉清金靈宫鳯嘯府幽神郷舍清里中迴真下映入兆脾府幽關之口便咒曰中元總靈洞眞髙清之氣流煥五道發明四度交慶練氣變形混合太空迴監我情保録玄圖記簡勒生南昌刻筭九天書名八景神宫輔衛三清千乗萬騎立降我庭招真致仙飛升太靈畢仰嚥十二氣止行之十二年則中元虚皇君降真兆房授兆升中玄圖司命玄録通真徹微尅獲上仙祕則靈降泄則考嬰五靈七明混生髙上君元紫皇之氣形長八千萬丈夏三月頭䢖三華寳天冠衣鳯文紫錦之袍佩流金火鈴帶九天丹皇之䇿坐絳雲之上手執金符光明流煥洞照上清思之還長八寸八分秋三月髙上君則變形為九頭鳯凰口御九星九色斑斕在絳雲之中光明洞曜映照上清思之還反眞形冬三月髙上君則變形一人九頭身著鳯文羽衣手執玉節立七色蓮花之上玄雲之中光明流煥洞照上清思之還反眞形春三月髙上君則變形為青赤二色之光光明欝欝洞曜南方此則反五靈之氣更受鍊元紫皇之精思之還反眞形修行髙上君之道常以夏至之日入室南向八拜朝髙上君畢還北向叩齒三通思髙上君隨四時形影在玉清鳯生宫洞光府七變郷九㑹里中迴真下映入兆心孔上際便咒曰五靈敷真髙上散暉變景混合練仙四飛流真散漫澤布九圍元節合慶福祚巍巍我享正真身生光輝夀齊日月萬劫不衰體生羽服昇入太㣲畢仰嚥八氣止三元无上玄老虚皇元辰君元精皇之氣形長六千萬丈秋三月頭䢖三氣玄晨飛冠衣九色百變夀命章衣佩玉皇招仙之䇿帶金玄紫綬立七色獅子之上素雲之中光明洞曜映照上清思之還長六寸六分冬三月元辰君則變形七頭童子一身衣虎文之袍足踐白雲光明流曜洞映上清思之還反眞形春三月元辰君則變形虎頭龍身著青黄斑斕文彩光明在紫雲之上照明十方思之還反眞形夏三月元辰君則變形為赤白二色之光光煥赫赫照明上清此則反三元之氣更受錬元精皇之精思之還反真形修行虛皇元辰君之道當以秋分之日入室西向六拜朝元辰君畢還北向叩齒十二通思元辰君隨四時形影在玉清明範宫耀華府天徳郷值正里中迴眞下映入兆肺府上關之下便呪曰三元散華元辰應符練化九道變形四周混合成眞氣象反𥘉廻靈曲映精灌我軀太一保命勒仙靈符五老降席上眞遨逰逍遙玄和形同太虚餐霞嚥氣神明結儔畢仰嚥十二氣止此虚皇上道祕於三元玄臺萬劫一出得者神仙祕則真降泄則禍嬰玄寂九元上虚皇君元飛皇之氣形長五千萬丈冬三月頭䢖飛天紫冠衣五色斑文虎裘佩流金之鈴帶交靈素綬立玄龜之上在玄雲之中光明流煥朗照上清思之還長五寸五分春三月九元上虚皇君則變形為老人頭䢖黄巾身衣玄羽之衣手執金㦸足立紫雲之上思之還反眞形夏三月九元上虚皇君則變形為九日更相累連光明流曜映照上清思之還反眞形秋三月九元上虚皇君則變形為白黒二色之光光明奕奕照明北方此則反玄寂之氣更受練元飛皇之精思之還反真形修行上虚皇君之道常以冬至之日入室此向五拜朝虛皇君畢叩齒三通思虚皇君隨四時形影在玉清七瑶宫北元府恬水郷上善里中迴眞下映入兆兩腎幽闕之中便咒曰玄寂通微散精虛皇三元混合飛玄流光神童漑灌玉女散芳元父交慶福祚我當八景輔翼五老降房得覩上靈椄顔仙王永享罔極仰飛太空輕羽飛行升入上宫畢仰嚥十氣止此玄寂上道祕於太上六合紫房依科萬劫一出玄授上仙之人得者神仙飛行上清也太明靈輝中眞无上君元玄虛之氣形長九千萬丈春三月頭建七寳飛華之冠衣五黄五色章衣佩日精三華之印帶金巾流精之劔立青龍之上碧雲之中光明暐曄洞映玉清思之還長九寸九分夏三月无上君則變形為人頭龍身口御日精九色文彩光照東方在碧霞之中思之還反眞形秋三月无上君則變形為一龍九頭九色斑斕光明洞曜映照上清在紫虚之内思之還反眞形冬三月无上君則變形為青黒二色之光光明欝欝洞照東方此則反太明之氣更受錬元玄虛之精思之還反真形修行无上君之道當以立春之日入室東向九拜朝无上君畢還北向叩齒九通思无上君隨四時形影在玉清欝森宫八冥府金羅郷雲羅里中迴具下映入兆肝府中關之户便咒曰大明重曜敷靈散金玄暉八發流精洞隂无上灑津澤溢九矜内充