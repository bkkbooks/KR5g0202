body:
  text: 龜山丹皇飛玄紫文飛玄紫氣凝靈根綱維玉虚緫萬神空中欎勃結自然上有𡹃𡼳十二傳玉樓峩峩曜景雲流精紫闕帶金軒瓊堂瑋鑠繞八騫中出青金九靈仙丹皇真母號精延飛青羽䙱晨嬰冠左執玉節右握靈幡五色命魔奉對帝尊把持符籍當生門咀月嚼日噏玉泉離羅吐暉錬五魂内充外溢絳府欣金光煥煥形正圎從朔入金色沌沌唯有開明曉此言日五月十精北元刻見華盖領仙君紫氣左廻與斗運歴度四七入金門正是丹皇校萬仙有明此訣加精勤被形宻思毎令分妙景感㑹得要文三年當審保長全九年乗空致羽裙鳳衣輕翔昇龍山俯仰九靈謁玉晨南極上元君曰此結紫炁飛玄之文刻書西龜山上流精紫闕金華瓊堂北䆫之上九天丈人目其篇記曰龜山丹皇飛玄紫文西王母常所寳祕其旨𨼆奥皆是九天宛妙之韻自无仙名不得眄其篇目得者皆九天書録名題龜山九天丈人云修其道常以正月二月三月四月六月七月八月九月十一月十二月一年十月月三日五日九日十五日二十五日一月五過清齋誦詠文一徧以夜半之後露出中庭仰伺北斗華盖之中有紫雲之氣從斗綱左廻歴度二十八宿竟還金門之上若在人中天隂无光當於室内默念内思如上法毎今分明思畢當心拜紫雲四過叩齒三通仰祝曰天夜朗清幽虚啓真流雲徘徊金華四褰丹皇敷暉靈飛紫軒是夕開陳青金授仙成我上願體應自然結命月華保年日根三靈合景永停龍山宻夜清披請如所言畢便口引紫氣二十八嚥止行此三年刻有神真降兆寢席也身有紫氣映絡一形九天書名必復上仙也九天丈人曰天書萬重各論其妙如此一事亦足致靈真下降振翮九霄騰景玉清遊宴雲宫也自非妙法西王母亦不秘之於中衿大有亦不明其禁限也南極上元君曰天有禁氣之雲干於日月五之分在其方國皆有合道之人得仙之君也如此之候其象自見九天丈人云得見此雲便依文禮祝不必須其常日也勤加在意刻得雲降昇騰有㑹也正可封之於心不得輕以示人道泄則靈散仙無由有感也元始鍚西王母青金丹皇玉文髙上元始告靈九天太空祖宗西王母諱婉衿寔天九靈之氣混西金之魄結紫雲之胞骨錬日精之暉吐納七曜之華恊晨霞而飡太陽鳯髓噏於月精蘭腦凝於玉根金藏結絡丹形八纒紫心表明於丹皇妙圗髙列于帝軒寢景靈嶽灰心上清功濟萬品惠溢有生秉節獨操累劫長存故致髙上曲華元始鍚焉以婉衿有金真之徳鍚禪西元九靈上真仙母青金丹皇之號封掌龜山緫領元録依俯仰徴青瓊之板金書玉字給九天鳯衣飛青羽䙱晨嬰玉冠鳯雲之舄神鳯紫輪飛行羽盖二十四乗五色仗幡命靈之節流金火鈴夜光之燭㓕魔玉章九天詔信衛以上宫西華玉女七百人治西龜之山流精紫闕金華之宫一月三登玉清再宴崑崙五校衆仙五嶽河海十方靈官莫不緫統依具以言諸應儀軌悉如瑶䑓大有舊典三天正文施行青瓊之板金書玉字青瓊之板金書玉字青金丹皇鍚文皆出自九天大有宫中俯仰之格皆結髙玄空洞自然之章以徴於上真髙聖之官不施於始學如金闕東華方諸宫亦有儀軌以召始學飛仙之人也此亦悉出大有之格但品第尊卑以為髙下之異耳自非九天有名方諸有録終不見其篇目得見其文皆刻簡來生列圗帝籍應得神仙故逆表於靈格道成之日自當更有天真下降受其書鍚文也南極上元君曰金書玉字皆刻書青瓊板上或書青玉板上板長九寸九分廣二寸四分以金縷字文侍板玉童玉女各二人典香檢泄依四極明科百年内有其人聽一傳南極上元君曰瓊玉非世人所能用若有名於方諸得見其文亦可刻書青木板上以金縷其字文盛之青錦之囊焼香朝禮九年自當有天真降授瓊玉之板也南極上元君曰始生變化元録與九氣元洞俱生髙上玉皇上聖帝真皆結元洞之氣以為形名之號衣冠服綵皆出九天大有俯仰儀軌郷居里號亦結自然而生天有八㑹之氣四改之運以綱維玉虚分理隂陽玄化治始成生萬品髙上衆聖變形化景皆隨四時改易順運應命與化推遷无衰老之期極化長存故曰道无常名此之謂也王母徳酧髙玄故為萬氣之母是致元始鍚徴丹皇之號玄授素書元録一卷使授後聖神仙之徒知元始之道結自然之號有變化之氣得見其篇者則九天逆書於仙籍方諸刻名於丹䑓加其精思无出九年尅得與真披顔寢房隨四時變化飛騰九天也南極上元君曰上清之道髙玄寳經以存思為感嚥氣為㑹旣得叅其篇目便應明其存思元始變化之象知其形色光氣文彩四時改易將閉眼不言而自到嚥氣不引而自㑹也如此不旬年而覩神不旬月而氣充也後學諸賢自可勤精其思則玄空之可明也接仙之有由也南極上元君曰凡修上仙之道思神念真服氣嚥液而不知元始之號四時變化改易光象氣之根源徒閉眼於莾莾空嚥而无想神真何由得降氣液何由得充也對顔瞻目由有晻曖而况悠悠之中不别其形氣者哉謂此徒勞於寢息無益於空唱也上清始生變化元録元始皇上丈人元玉虚之氣諱延世音字觀無覺形長九千萬丈常以春三月則冠九氣流精紫曜之冠衣九光錦袍身佩九色無縫自然之綬帶六山火玉常乗碧蒼二色之雲坐則九色師子光明暐曄在上清之上玉虚之中思之還長九寸九分夏三月元始皇上丈人則化形一身九頭長七千丈戴九色之雲衣丹錦百變之光無縫之袍帶九大仙錬之劒乗丹紫二色之雲坐九色之龍光明流煥在玉虚紫雲之中思之還長九寸秋三月皇上丈人則化形一身九鳯之頭形長五千丈九色斑紋虎衣乗七色之雲華光交煥在上清之上思之還長七寸七分冬三月皇上丈人則化形為青黒二色之光勃勃如月之魄此則反玉虚之氣更受錬元始之精思之還復本元真形修元始之道當以立春之日沐浴入室東向朝元始皇上丈人九拜畢還北向叩齒九通思皇上丈人隨四時形像在上清之上金相宫瓊天府八明郷定真里中廻真下映入兆明堂之中微祝曰皇上開真九道合明變錬虚無洞映上清分形化景四運順生我享其真與真合靈内結玉仙外纒八冥八景扶翼運致舟軿乗雲駕煙䇿御上清飛行雲房朝謁帝京畢仰嚥九氣止能知元始變化形景内諱祕名則夀九百年修之九年與神交顔則能變景飛行太空髙靈九天王元太虚之氣諱上觀洞字運梵形長九千萬丈以秋三月則頭建金華之冠衣雲文錦袍帶九光流鈴交靈紫綬乗舟碧二色之雲坐則九色師子光明煥燿上清思之還長七寸冬三月髙靈九天王則化形九頭頭戴九日一身衣九色斑文鳯衣常乗青黄二色雲坐則九色師子光明之輝暐曄在上清之上思之還反真形春三月九天王則化形分别為九人口衘九月衣鳯文羽衣常乗九色之雲坐則九色之煙光明煥爛在上清之上太虚之中思之還反真形夏三月九天王則化形一為紫青舟紅四色之光光氣混沌照九天此則反形太虚之氣更受錬九天之精思之還反真形凡修九天真王之道常以冬節之日沐浴入室西向九拜朝九夫王畢還北向叩齒九通思九天王各隨四時形象在上清金蘭宫太清府開明郷通真里中廻真下映人兆上元丹田之中便微祝曰九靈元精變錬上明三合齊景分氣散形出空入玄上黄下青歴運廻晨參絡朱軿洞遊髙虚廻映我庭混合真光神化來生能乗雲浮上戲上清仰嚥九氣止修行九年上感九天刻得神真下降授兆真書自然得乗九色雲輿飛行上清玉真九天丈人元紫虚之氣諱延世明字係上連形長九千萬丈冬三月則須建飛精百變之冠九色流光自然錦䙱佩衣九元通真之䇿常乗五色之雲坐則九色之煙光明暐曄在上清之上思之還長九寸春三月玉真九天丈人則化形為鳯凰一身九頭頭戴九氣玄精衣九色斑文羽袍常乗十二飛麟坐則五色蓮華之上光明流曜百變之色在上清之上紫虚之中思之還反真形夏三月玉眞九天丈人則化形為龍身人頭頭戴十二光衣青黄紫三色羽衣口衘素綬常乗九色之雲坐則五色師子光照上清思之還反真形秋三月玉真九天丈人則化形為紫緑二色之光光氣相繞如日月相沓此則反形紫虚之氣更受錬九天之精思之還反真形行玉真九天丈人之道常以立冬之日沐浴入室西北向九拜九天丈人畢還北向叩齒九通思九天丈人各隨四時形影在上清丹靈宫開清府三合郷元明里中廻真下映入兆洞房之中便微祝曰九天上靈元始自然含錬八道九真胎仙中寳紫元三素外纒變景錬氣順運流遷洞化入微我道早分目招靈暉心披五雲乗䇿八景飛入帝晨畢仰嚥九氣止知九天丈人變化形影内諱祕字便名書九天修之九年得見真神乗空飛行上昇玉清道根九天元父元洞根之氣諱九靈導字混大真形長九千萬丈春三月頭建七稱朱玉之幘無極寳天之冠著九天鳯衣神雲鳯舄帶素靈之綬常乗碧霞飛輿從十二飛龍坐則九色華光在玉清之上光明百變暐曄太空思之還長九寸夏三月元父則化形一身九頭頭戴九日衣赤鳯斑文虎裘帶十二色綬乗九色之鳯坐則黄白二氣之上光明煥虚洞耀玉清之中思之還反真形秋三月元父則化形分為九人同衣九色羽袍帶漫廷龍淵之劒虎頭鞶囊交靈素綬坐九氣立空之上光明變煥曜玉清細微之内洞根之中思之還反真形冬三月元父化形為日精之光與紫暉相沓此則元父反形道根之氣更受錬洞根之精與玄母合變混沌二像之光思之還反真形行元父之道當以太𡻕之日沐浴清齋入室西北向朝九天元父九畢還北向平坐閉眼思九天父各隨四時形影在於九天之上太極瓊宫玉寳之府丹靈郷洞元里中廻真下映入兆上元崐崘之中便微祝曰髙上帝尊元始大神合真匡氣形秀紫天乗雲駕浮絡景八煙廻輪曲降道廕我身得乗霄軿奉侍靈轅今日八㑹上願開陳所求所乞靡不如恩長享元𠮷與帝同存䇿御八景飛昇玉晨畢仰嚥九氣止行之九年則覩真形元父降側與兆共言授兆寳書九天上録書名玉簡身登上清輕泄此道没身鬼官殃及七祖長充河源道極九天玄母元洞淵之氣諱負沌字黄大覆形長七千萬丈以秋三月頭戴紫元玄黄寳冠著青精神光錦繡霜羅九色之䙱華光十二色交靈紫綬常乗紫雲飛輪從十二鳯皇三十六仙人坐九色師子光明流煥在上清之上思之還長六寸六分冬三月玄母則化形為人頭鳥口口衘月精衣青精飛羅之䙱交帶流蘇紫綬常乗十二色雲坐則百變之光洞照上清細微之内思之還反真形春三月玄母則化形為鳯身麟頭七色斑斕十二華光流精交絡洞映上清細微之内八冥之裏思之還反真形夏三月玄母則化形為紫黄二色之光如月之暉五色流煥洞映上清此則玄母反形洞元之氣更受錬道極九隂之精雌一合慶化生萬神思之還反真形九年則元父負籍於南陽玄母降形於丹房修行玄母之道當以本命之日沐浴清齋入室東南九拜朝玄母畢還北向平坐叩齒九通閉眼思九天玄母隨四時形影在九天之上瓊林七暎之宫玉寳洞元之府九光郷上清里中廻真下暎入兆臍下命門丹田宫中便微祝曰三合五離混化二元氣結凝神神變合魂雌一含真胎息生門隂精玄降淘灌形源錬化明景靈秀自然今日上吿玄母開陳十二上願保成玉真五形納澤骨錬玉仙輕身飛騰乗虚絡煙上造紫極奉接神顔畢仰嚥三九氣止行之九年玄母感悅二景交懽即勒北帝消㓕死名上奉九天記録紫篇得覩真形飛行上清輕泄我道死充河源七祖負役十苦八難刀山劒樹萬刼不原得者寳宻自