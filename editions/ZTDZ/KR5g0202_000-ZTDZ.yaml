還反眞形秋三月金華景元君則變形為人頭龍身五色煥爛光照紫虛在三色之上思之還反眞形冬三月金華景元君則變形紫赤黄三色之光光明奕奕照映上清此則反太𥘉九素之氣更受錬元皇靈之精思之還反眞形修行金華景元君之道當以冬至之日及太歳之日入室東北向九拜朝景元君畢還北向叩齒三通思景元君隨四時形影在上清明真宫靈暉府天權郷逰樂里迴眞下映入兆頭靣之境㣲咒曰太𥘉混黄三氣清分金華洞房號曰景元明道九迴四變合雲上結玉符下保丹門攝魂固魄保真存存錬形易骨髓腦化僊龍飛鳯舞上升帝軒畢仰嚥九氣止行此道九年致神眞降見身能變化飛行太靈九皇上眞司命君元玉靈之氣形長五千萬丈夏三月頭䢖丹華紫曜飛天冠衣五色飛黄雲羅之袍佩流金火鈴帶神虎之符立五色雲氣之上光明照映煥爛太无思之還長五寸五分秋三月司命君則變形為鳯皇九色斑斕光明煥煥照明上清思之還反眞形冬三月司命君則變形為老公頭䢖紫巾衣七色斑文虎衣手執金杖足躡三氣之雲光明煥赫洞照上清思之還反眞形春三月司命君則變形為青碧黒三色之光光明奕奕照映上清此則反九皇之氣更受錬玉靈之精思之還反眞形修行上眞司命君之道當以立春之日及本命日入室東向九拜朝司命君叩齒九通思司命君隨四時形影在上清紫耀宫七寳府北生郷華宫里迴真下映入兆胷腹之境便㣲咒曰九皇上眞理化總生司筭南陽監延朱庭太一度符五老書名九迴八㣲仙魂乃明三變五錬朽骨反嬰華顔朱童與帝常靈保符日月後天而傾變化无方升入帝庭畢仰嚥三氣止行之九年司命勒録眞人降房名書丹臺永保長存天皇上眞玉華三元君元洞靈之氣形長七千萬丈秋三月頭䢖晨纓飛華紫冠衣五色玄黄紫䙱佩太上丹文紫章帶交靈紫綬立九色師子之上光明煥爛照明上清思之還長七寸七分冬三月玉華三元君則變形為女子頭作飛雲之髻衣紫黄飛羅之衣口衘月足躡黄紫青三色之雲光明照映十方思之還反眞形春三月玉華三元君則分形為三女子頭作三角之髻著七稱之冠負月抱日在紫雲之中立蓮花上思之還反眞形夏三月玉華三元君則變形為紫白青三色之光光明煥煥洞照玉清此則反天皇之氣更受錬洞靈之精思之還反眞形修行上眞玉華三元君之道當以春分之日丁卯日入室東南向三拜朝三元君畢還北向叩齒三通思三元君隨四時形影在玉清通妙宫定㣲府雲路郷清源里迴眞下映入兆下關少腹至脚便祝曰玉華散靈三元錬精迴合玉眞變景雲庭流雲徘徊煥落火鈴金符龍幡十絶旄旌上景丹臺逰盻八冥髙上曲映監我道成三晨合願克享長生變神通㣲日月齊并畢嚥三氣止行之九年三元曲映降眞兆房自覩神顔致道神仙太一上元禁君元飛靈之氣形長九千萬丈冬三月頭䢖三寳晨纓飛華紫冠衣九色玄黄飛雲之䙱佩六山火玉帶神精交靈紫綬坐七色之雲光明煥煥照明上清在九天之上思之還長九寸九分春三月上元禁君則變形為長人通身如黄金項負相輪衣四十二條九色法衣坐三氣之中光明煥煥照映上清思之還反眞形夏三月上元禁君則變形為三月之狀光色相沓混混沌沌乍合乍離在紫雲之中思之還反眞形秋三月上元禁君則變形為蒼緑紫三色之光更相纏繞在玉清之中此則反太一上元之氣更受錬飛靈之精思之還反眞形修行上元禁君之道當以立夏之日及庚申日入室南向三拜朝上元禁君還北向叩齒九通思上元禁君隨四時形影在上清天皇宫玉虚府開元郷紫合里迴眞下映入兆左手之户便咒曰太一攝命桃康理魂无英公子及與白元三眞齊暉保固死關錬氣通神合形帝君四變八玄隨化成仙千乗萬騎翼我升雲飛行上清形造紫晨畢仰嚥十二過止行此九年得見上元禁君名書南極保仙長存元虚黄房眞晨君元清靈之氣形長六千萬丈春三月頭戴七色朱精華冠衣雲文之袍佩金虎鳯文帶神虎玉章坐紫雲之中五色蓮花光明暐曄照明上清在八冥之外細㣲之内思之還長六寸六分夏三月黄房真晨君則變形一身三頭頭巾紫巾形衣紫黄二色之衣手持金㦸在黄房雲宫五色師子之上思之還反眞形秋三月黄房眞晨君則變形爲人身龍頭九色斑斕光明煥煥洞照上清黄雲之内思之還反眞形冬三月黄房眞晨君則變形為黄白赤三色之光光明煥煥徹照九天此則反元虚黄房之氣更受錬元清靈之精思之還反眞形修行眞晨君之道當以夏至甲子之日入室西南向九拜朝眞晨君畢還北向叩齒九通思眞晨君隨四時形影在玉清金華宫紫生府長命郷永康里迴眞下映入兆右手之戸便咒曰黄房中眞元虚洞明日中改號號曰方盈朱臺煥赫濯暉金庭含胎錬息流紫觀青二氣混合體化仙生飛津内唱色童顔嬰自然升飛上入三清畢嚥十二氣止行之九年得見神眞通靈飛空太極主四眞人元君元四芒之氣形長七千萬丈夏三月頭帶逺逰寳冠衣青羽飛華錦袍五色羽裙佩神嬰育延之劒帶流金火鈴執神乕玉符坐四色雲中光明流煥洞照上清在細㣲之内思之還長七寸七分秋三月四眞人元君則變形為四頭鳯皇人形衣九色班文虎衣足履五色師子或立蓮花之上紫炁之中思之還反眞形冬三月四眞人元君則變形為四童子青赤白黒各衣一色錦裙各執一色之節一色之幡在紫雲之上思之還反眞形春三月四眞人元君則變形為青赤白黒四色之光光色混沌如雲之煙煥煥照明此則反太極之氣更受錬元四芒之精思之還反眞形修行四眞之道當以立秋之日及甲子日入室西向四拜朝四眞畢還北向叩齒九通思四真元君隨四時形影在玉清四明宫八朗府金瓊郷極瑛里廻眞下映入兆左目中便咒曰太極四靈元君上京金精浩靈錬神入光日華散暉朱月灌漿靈芝八散通我明梁太一有命四司來迎身生竒毛飛羽羅裳騰空歩虚骨肉俱翔仰嚥八氣止行之八年四眞曲映目覩神顔名書太極得為眞人四斗中眞七晨散華君元四沌之氣形長四千萬丈秋三月頭帶七晨飛精華冠衣黄錦飛裘青羽之裙帶靈飛紫綬足躡七元手把景星光明煥煥洞照上清在細㣲之内思之還長四寸四分冬三月七晨散華君則變形一身四頭頭角一日身衣四色之衣手把斗剛足踐紫雲光色煥煥照明上清思之還反眞形春三月七晨散華君則變形爲四童子形長四尺衣五色班文之衣手執華幡在黄雲之中思之還反眞形夏三月七晨散華君則變形為青赤白黒四色之光光色混沌洞照上清此則反四斗中眞之氣更受練元四沌之精思之還反眞形修行散華君之道當以秋分之日入室北向八拜朝眞畢叩齒三通思散華君隨四時形影在玉清華晨宫魁元府七剛郷金蓋里廻眞下映入兆右目之中咒曰四斗總剛中眞散華三光混合吐噏玄霞甲張理命七神制魔列圖五符年同上𥘉金輪寳蓋玄精煥靈騰身太空上造神廬畢嚥炁七過止行之七年則名書玄圖七元感徹眞人下降目覩神顔授兆神經致雲輿羽蓋白日升晨晨中黄景元君黄暉之氣形長七千萬丈冬三月頭帶金華寳冠衣五色班文之裘飛羽錦裳帶七元寳章流金火鈴手執九色玉節坐則黄雲光明煥煥流曜九天洞照上清右八冥之内細㣲之中思之還長七寸七分春三月黄景元君則變形一身三頭頭戴鳯皇通身黄色手把金㦸足立五色師子之上光明奕奕洞照上清思之還反眞形夏三月黄景元君則變形為三人頭著日光口衘七星身衣五色之䙱常立黄雲之上思之還反眞形秋三月黄景元君則變形為黄紫蒼三色之光光炁相繞混黄太空此則反晨中之炁更受錬元黄暉之精思之還反眞形修行黄景元君之道當以立夏冬至之日入室東向三拜朝黄景元君畢長跪叩齒三通思景元君隨四時形影在玉清七靈宫機玄府九晨郷天紐里廻眞下映入兆肺部華盖之門便咒曰晨中童子黄雲三纒霄臺煥秀恊映玉眞號曰玄上列位皇賔總攝百神𢹂入紫煙畢嚥炁三過止此晨中廻生祕法知者不死修之飛仙輕泄靈音身負河源金闕後聖太平李眞天帝上景君元通晨之炁形長九千萬丈春三月頭建七精寳華冠衣玄黄五色之裘青錦飛裙手執虎符坐七色之雲光映暐曄照明上清在細微之内八冥之外思之還長九寸九分夏三月天帝上景君則變形為老公頭帶飛龍身衣黄文之裘黄羽之裙手執金板立紫雲之上光明奕奕洞照上清思之還反眞形秋三月天帝上景君則化形為小童子衣五色之衣或乗師子或坐青雲思之還反眞形冬三月天帝上景君則變形為蒼黒青三色之光光明混沌更相纒繞此則反金闕之炁更受練元通晨之精思之還反眞形修行天帝上景君之道當以正月一日及甲子立春之日入室東南向九拜朝上景君畢還北向長跪叩齒十二通思上景君隨四時形像在玉清金闕宫玉眞府東華郷九炁里廻眞下映入兆五藏結喉之本便咒曰金闕恊神生九炁映丹霞明光翼金靈五雲混三華玄漱飛晨津含練自然牙鳴皷召百神嘯咤來羣魔千乗萬騎官衞我登玉阿畢九嚥炁止此金闕玉房祕要得者為後聖種民修之九年飛升金闕輕泄靈文七祖充責已身亡命長負刀山太虚後聖無景彭室眞君元四演之炁形長四千萬丈夏三月頭建通天紫冠衣白錦文裘素羽飛裙腰帶飛靈之綬左佩流鈴手把七元之光常立紫虚之上蓮花之中光明暐曄洞照上清思之還長四寸四分秋三月彭室眞君則變形為仙人色如金剛項光圓明映照四天衣三十二色無量法衣光明奕奕在上清之上細㣲之内思之還反眞形冬三月彭室眞君則變形為人身鳯頭五色斑斕立紫虚之中光明煥煥照明上清思之還反眞形春三月彭室眞君則化形爲蒼赤白玄四色之光更相累沓如日之暈雲此則反太虚之炁更受練元四演之精思之還反眞形修行彭室眞君之道當以春分之日及本命之日入室南向四拜朝神畢還北向叩齒三通思彭室眞君隨四時形像在上清無量宫玄闕府四正郷合元里中廻眞下映入兆五藏大胃上口便咒曰太虚種福庭福福相因生受生九玄户眞炁日中榮練骨結仙䈥治兆昇三清六合㑹萬神虎符攝朱兵累祖保元籍世世禮仙經畢仰嚥炁四過止此後聖練仙上法祕之太虚无景宫萬刼一出得者為後聖種民修之九年奉迎聖君於上清宫䡖泄身役鬼官太玄都九炁丈人主仙君元變浩之炁形長七千萬丈秋三月頭建朱精九徳寳冠衣青羽六合之裘百變文光之裙腰帶招仙制魔之劒坐九色師子三炁之雲光明奕奕洞映十天思之還長七寸七分冬三月主仙君則變形爲九人身長九寸頭戴月光各衣青黄五色仙衣常在紫雲之上時乗鳯皇逰戯玄都思之還反眞形春三月主仙君則變形一身九頭頭戴鳯皇五色斑斕在上清之上紫虚之中思之還反眞形夏三月主仙君則變形為蒼白紫黄玄赤青紅緑九色之光更相纒沓在上清之上此則反太玄之氣更受錬元變浩之精思之還反眞形修行主仙君之道當以立夏之日及本命太嵗之日入室西南向九拜朝主仙君畢還北向叩齒九通思主仙君隨四時形像在上清太玄宫王堂府玄都郷總眞里中廻眞下映入兆九腸之口伏願之下便咒曰太玄生神保鎮命門伏尸滅落寧神安魂廻光帝室受仙玉女太一𢹂提同㑹帝賔長濟金房年合月煙永享無期壽與天連畢仰嚥九過止此太玄主仙上道祕之金房玉匱萬劫一出得者不死行之神仙輕露身死負考河源上清八景老君元雲源之炁形長八千萬丈冬三月頭建飛晨華冠衣自成雲文之䙱飛仙羽裙腰帶虎書手把金鈴常立七色蓮華之上紫雲之中光明煥煥照明十方思之還長四寸四分春三月八景老君則變形爲八光童子八人齊長八寸衣黄錦之帔飛羅之裳生八色之雲光明煥煥照明上清思之還反眞形夏三月八景老君則變形為老公頭建黄巾身著五虎衣手把金節佩攝殺之劒在黄氣之中常口引日光思之還反眞形秋三月八景老君則變化為黄白紫紅綠玄赤蒼八色之光更相累沓在上清之上則變上清之炁更受錬元雲源之精思之還反眞形修行八景君之道當以秋分之日及本命甲子之日入室西向八拜朝八景君畢還北向叩齒九通思八景君隨四時形像在上清清虚宫洞清府上元郷紫房里中廻眞下映入兆少腹二孔之本便咒曰上清玄玄氣八景生一紀黄元恊神宗精魂對帝子五符保命籍度年同劫始飛雲八景輿昇兆雲門裏身飛入太虚死魂翻然起畢仰八嚥止此上清玄祕之道太上藏之金格有得者不死修之飛仙輕泄靈文七祖充責已身亡命負罪幽山東華方諸宫髙晨師玉保王青童君元日精之炁形長七千萬丈春三月頭建青華寳晨冠衣青羽飛裘青錦飛裙腰帶青精通明之劒手執九色魔幡帶神虎之符坐青雲之上紫煙之中思之還長七寸七分夏三月青童君則變形為人身鳥頭通身青羽之衣立五色師子之上手持召仙之䇿在紫雲之中思之還反眞形秋三月青童君則變形為青精童子頭戴飛龍口衘火鈴坐玄虚之上常有青雲繞絡身形思之還反眞形冬三月青童君則變形為青赤緑三色之光更相繞纒在上清之上青雲之中此則反東華之炁更受錬元日精之精思之還反眞形修行青童君之道當以立冬之日及本命庚申丁卯之日入室東向九拜朝青童君畢還北向叩齒十二通思青童君隨四時形像在上清方諸宫青元府通霞郷東華里中廻眞下映入兆百關絶節之下咒曰青華混廻五道煥分金晨建節受持七門太一保命靈摽理魂陵陽度籍元公召神奉兆登霄寢息玉軒福臻億億慶流千千書名東華世享上仙畢仰嚥九炁止此東華玉格上眞祕道大刧周天地改易其文當見玉嶽之室得者不死修之得過洪灾白日飛騰輕泄七祖充役已身亡命負考河源扶桑大帝九老仙皇君元源谷之炁形長九千萬丈夏三月頭建寳瑯晨冠衣亂色百變之袍腰帶飛靈素綬佩豁落七元之劒手執青靈命魔之幡立九色之雲光明煥煥照映上清思之還長九寸九分秋三月九老仙皇君則變形為仙色如金剛項有圎光衣七十二條法衣立三炁蓮花之上光明煥赫洞映上清思之還反眞形冬三月九老仙皇君則變形為人頭龍身五色斑爛在紫虚之上碧雲之中思之還反眞形春三月九老仙皇君則變形為碧蒼玄三色之光更相累沓在上清之上此則反扶桑青浩之炁更受錬元源谷之精思之還反眞形修行九炁仙皇君之道當以春分之日及本命四月八日入室東北向三拜朝仙皇君畢還北向叩齒二十四通思仙皇君隨四時形像在上清清元宫晹谷府溟涬郷扶桑里中廻眞下映入兆本命之根胞胎大浩中便咒曰太帝變景扶晨理元四氣練易百變千分入兆胞胎斬斷死根太一守戸玉眞護門拔度三界體寳金仙神津發溢合羽揚輪書札玉位世保福原禍死絶沉更生仙魂七玄同飛昇化帝門畢仰嚥二氣止此太帝玄祕之文藏於玉房萬劫一行得者長存修之致仙輕泄禍伐没命河源小有玉眞萬華先生主圖玉君元納眞之炁形長三千萬丈秋三月頭建逺逰寳冠衣飛仙羽衣帶寳眞洞章手執華幡在青雲之中五色師子之上光明奕奕照明上清思之還長三寸三分冬三月主圖玉君則變形為人身鳥口口衘玉符身衣羽衣手執三炁之華光明落落照明上清思之還反真形春三月主圖玉君則變形為人身兩手為鳯翅通身衣黄羽之衣足立七星在紫虚之上思之還反眞形夏三月主圖玉君則變形爲青黄二色之光如雲之沓在上清之上此則反小有玉眞之炁更受錬元納眞之精思之還反眞形修行主圖玉眞君之道當以立秋及本命之日入室西北向一拜朝玉眞君畢還北向叩齒十二通思玉眞君隨四時形像在上清金雲宫通炁府招揺郷玉眞里中廻眞下映入兆鼻下人中便咒曰小有結眞合精練神大廻變化六混七分帝一理命无英保魂七華生朽沉景起煙奉籍帝尊慶㧞七玄形合日月三光相連乗羽駕逰昇入髙晨畢仰嚥三氣止此小有天中金格玉文得者壽同天地修行上為眞人妄傳輊露罪及七玄身死負考萬劫不原玄州二十九眞伯上帝司禁君元仙演之氣形長五千萬丈冬三月頭建三玄通天寳冠衣九色虎衣班文之裘飛青羽䙱腰帶虎書佩流金火鈴在紫虚之上太清之中光明煥煥思之還長五寸五分春三月上帝司禁君則變形為人身獸頭狀麒麟或通身麟形青黄文彩斑斕立三色雲炁之中思之還反眞形夏三月上帝司禁君則變形為童子頭戴飛龍身衣紫黄羽䙱乗鳯皇在清虚之中或遊宴五嶽手執青无之録思之還反眞形秋三月上帝司禁君則變形為百變之光混沌亂色更相纒繞在上清之中此則反玄州二十九眞之炁更受錬元仙演之精思之還反眞形修行上帝司禁君之道當以立夏之日及秋分甲子日入室東向九拜朝司禁君畢還北向叩齒十二通思司禁君隨四時形像在上清司空宫仙都府玄隂郷總正里中廻眞下映入兆隂莖之端便咒曰玄眞輔仙上帝監籍神王練炁五雲敷席符命四司檢簡精魄太一授録保兆仙格還童觀容停年止白身飛玄都與天同宅五帝𢹂提長享玄伯畢仰嚥九氣止此玄洲練仙祕道藏之大有之房萬年一出得者仙伯書名長生无極修之飛行上昇仙庭輕泄者身死謝罪鬼官太无晨中君元玉戸之炁形長七千萬丈冬三月頭建金華七寳冠衣朱文羽衣九色之綬腰帶金章手執虎符紫雲之上太清之中光明煥煥照映十方思之還長七寸七分春三月太无晨中君則變形為童子坐生蓮花之中手執五色華幡在上清紫雲之上思之還反眞形夏三月太元晨中君則變形為三人悉建逺逰冠衣飛青羽䙱腰帶素綬手執殺魔之律或乗飛鳯在上清之上思之還反真形秋三月太元晨中君則變形為白青黄三色之光更相纒繞在上清之上此則反太元之炁更相受錬元玉户之精思之還反眞形修行晨中君之道當以立秋秋分庚申之日入室西北向三拜朝晨中君畢還北向叩齒十二通思晨中君隨四時形像在上清玄洞宫六生府開仙郷玉戸里中廻眞下映入兆丹田宫本命帝室便咒曰仙靈散暉浩晨四布混合九玄三五流注結真成仙仙練昇度元父觧形玄母養護五神輔翼飛昇霄路三元保録帝真飴哺呼吸自然五華堅固長享无窮天地同祚畢仰嚥三炁止此太素上道得者延年億萬修之成真人九天書名不得輕宣露泄靈音身死失仙龜山九靈真仙母元混西金之炁形長七千萬丈春三月頭建寳琅扶晨羽冠服紫炁浮雲身披九色龍錦羽裙腰帶流金火鈴虎符龍書坐太空之中丹緑青三色雲之上光照煥曜洞映紫清思之還長七寸七分夏三月仙母則變形為九色之鳯一體九頭文彩煥爛光明奕奕洞照太虚思之還反眞形秋三月仙母則變形為人形鳯頭衣九色飛雲錦䙱腰帶交靈紫綬立九色之雲光明煥煥洞明上清思之還反真形冬三月仙母則變形為紫青黄三色之光更相累沓沌沌混混光明洞發此則反九靈之炁更受錬元混西金之精思之還人真形修行仙母之道當以九月九日及秋分之日入室西向九拜朝仙母畢還北向叩齒九通思仙母隨四時形像在上清寳素宫九玄府玉皇郷西龍里中迴真下降入兆明堂中便咒曰靈化通玄飛景九元凝精結神上為金仙混合成一散形億分上造太晨䇿空躡雲保命黄籙長靈劫年金簡素籍名刋帝軒永享太華與天同存畢仰嚥九炁止此九靈上道祕於九天之上大有之房萬劫一傳得者不死修之飛仙東方上始少陽青帝君元九霞之炁形長九千萬丈春三月頭建九元通天冠衣青錦飛裙佩大上九炁命魔之章帶翠羽交靈之綬常立碧雲之上思之還長九寸九分夏三月青帝君則變形一身九頭通身衣朱衣腰帶素綬足立蒼龍之上思之還反真形秋三月青帝君則變形人身龍頭通身青免立碧雲之上手執陽霞之符思之還反眞形冬三月青帝君則變形為黒光光色奕奕照明北方此則反上始之氣更受練元九霞之精思之還反真形修行東方青帝君之道常以立春春分之日入室東向九拜朝青帝君畢還北向叩齒九通思青帝君隨四時形像在上清常陽宫九生府東濛郷青谷里中廻真下降入兆肝府之中便咒曰上陽廻元元變入仙練青受化合成我神神真入玄欻化萬分千乗萬騎輔翼我身蒼龍碧霞錦帔飛裙運形上昇朝謁帝晨列簡東華㓕跡河源長居仙籍與日同軒畢仰嚥九炁止南方通陽納隂赤帝君元入丹之炁形長八千萬丈夏三月頭建三炁玄梁寳冠衣緋雲錦袍丹文之裙佩南極制陽之符帶朱宫入光之劒常立赤霞之上思之還長八寸八分秋三月赤帝君則變形為朱鳥口街赤綬足立赤雲之上光明煥赫洞照太虚思之還反真形冬三月赤帝君則變形為人頭烏軀頭戴日精口衘火鈴在紫雲之中思之還反眞形春三月赤帝君則變形爲青光光色欝欝照明東方此則反通陽之炁更受練元八丹之精思之還反眞形修行赤帝君之道常以立夏夏至之日入室南向八拜朝赤君畢還北向叩齒十二通思赤帝君随四時形像在上清洞陽宫朱陵府南極郷八炎里中廻眞下降入兆心府之中便咒曰三炁廻靈八帝九清飛天洞微丹陽映明混合中真練變自生四度改化反我真形隨炁運行與天合靈飛空乗虚上入帝庭長享元吉南極齊并仰嚥八炁止西方少隂西金白帝君元六素之炁形長六千萬丈秋三月頭建七炁明光寳冠衣白錦雲光之袍素錦飛裙佩素雲之綬龍淵漫延之劒常立素霞之上思之還長六寸六分冬三月白帝君則變形人頭虎身日光奕奕照明太空思之還反眞形春三月白帝君則變形虎頭人身頭戴月精口衘素綬身衣虎文足立師子之上思之還反真形夏三月白帝君則變形為黄光光色洞徹照明中央此則反少隂之炁更受練元六素之精思之還反眞形修行白帝君之道常以立秋秋分之日入室西向六拜朝白帝君畢還北向叩齒三通思曰帝君隨四時形像在上清金門宫通光府素水郷金元里中廻真下降入兆肺府之中便咒曰日月廻度三合七成西金混魄治練化形虎變九道七炁飛精帝君開真萬物化成玄虚與化炁入幽冥道合元契昇造玉庭與天同符與帝同靈長存吉祚億億不傾畢仰嚥六炁止北方通隂太陽黒帝君元五靈之炁形長五千萬丈冬三月頭建五炁玄晨之冠衣玄錦之袍五色飛裙佩七元流鈴帶文身通神之劒常立玄雲之上思之還長五寸五分春三月黒帝君則變形為人頭虵身五色斑爛口衘金符頭帶七星光明煥曜洞映上清思之還反眞形夏三月黒帝君則變形一身五頭頭戴五星身衣玄羽之衣足躡玄龜手執火鈴思之還反真形秋三月黒帝君則變形為白光光色奕奕照明西方此則反通隂太陽之炁更受錬元五靈之精思之還反真形修行黒帝君之道常以立冬冬節之日入室北向五拜朝黒帝君畢叩齒十二通思黒帝君隨四時形像在上清廣靈宫北黄府玄隂郷五靈里中廻真下映入兆腎府之中便咒曰五行演真隂陽合符玄炁廻運四改交周反形元虚乗空入無太一翼命帝君受符保仙紫相録字丹書五道并真合我形軀駕景䇿雲飛昇玉都畢仰嚥五炁止中央總靈髙皇黄帝君元黄生之炁形長三千萬丈以季月頭建黄晨通天玉冠衣黄錦之袍玄黄飛雲錦裙佩黄神越元之䇿帶靈飛紫綬常立五色師子黄雲之上思之還長三寸三分秋三月白炁玉黄帝君則變形分為四童子衣青白赤黒四色錦裳飛雲錦帔各頭戴日精之華手執五色之幡立素雲之上思之還反真形冬三月黒炁玉黄帝君則變形一身四頭朱鳥毛色斑爛照明北方思之還反眞形春三月青炁玉黄帝君則變形為皇上老人通身黄色頭戴圓光如之相輪手執金鈴足立青雲之上思之還反真形夏三月赤炁玉黄帝君則變形為赤光光色憧憧照明南方此則反髙皇之炁更受練元黄生之精思之還反真形修行黄帝君之道常以太𡻕甲子之日入室向太𡻕十二拜朝黄帝君畢還北向叩齒十二通思黄帝君隨四時形像在上清黄元宫髙皇府中戊郷四圎里中廻真下降入兆脾府之中便咒曰四剛總真靈化无方道合成一五行開張随運變號周圓四郷是日上吉乗隂御陽六甲直符太一下迎結我録籍書名上京得朝三元保仙神皇畢仰嚥十二炁止上清元始變化元録髙上玉皇帝上聖君九天玉真皆禀炁自然託形瓊胎𨼆秀紫元靈和感㑹得有人焉胤皇流之胄生而成真結空洞以爲字合三炁以為名受號帝位應化上清總仙髙虚拊任玄玄四時改易推節變通沐浴冠帶練飾長存運化形影應感而生幽冥恍惚故道无常名深不可測㣲難可窮天地規以得立太玄恊以致清日月持之以朗耀五行禀之以致靈巍巍徳宗蕩蕩髙尊其道髙妙非可勝焉元始記籙藏之太上六合宫中紫房之内萬劫一傳九天禁書非鬼神所聞得見其篇目將慶灑上葉福流玄根魂昇南宫七祖同歡名書玉札死生獲仙後聖學上真之道當練悉元始變化之形隨節改易以通其真以反其炁以練其神假令元始皇上丈人以立春之日納元玉虚之炁受皇上丈人之號此皆真形衣服正色竟春三月九十日中居真臨正至立夏之日皇上丈人則變其正形更受節化沐浴神真謂變仙易景通真納靈致炁長存周夏三月九十日中仙魂沐浴神真感通至立秋之日皇上丈人則隨節化形冠帶五常謂之仙化炁通玄玄内充外溢光輝發明變真飬炁致炁无窮周秋三月九十日中冠帶九天仙化成真至立冬之日皇上丈人含真胎息反炁自然觧脫身形變景入光還其元始受練反精育瑩神真光色混沌如雲之煙周冬三月九十日中結炁凝神還復正形四度廻周周而復生此元始四改之化隨節易容天地之運皆有盛衰否泰休息以應天關盛則臨正休則育養冠帶練精不失其常故天地長存无窮此妙化之道非可勝記學真之家當各隨其節修行存思衆真皆如元始皇上丈人之法八年之中不失常節尅致真人下降目覩神形能隨炁變化飛昇太空也凡修四變之道當隨節服四變之符假令春三月行道存思當先服東明通真變景陽霞之符夏三月行道當服南光八錬丹景四朗之符秋三月行道當服西精浩靈化景扶希之符冬三月行道當服北玄欝真練景蕭風之符若行黄帝之道當以季月服黄上八維生景玉門之符此元始變化結真上道行之者則通天炁招神致仙迃降靈顔曲映寢房中理兆形四梵之炁通明五宫開關受真使神安玉府随節縳仙下和隂陽條理候門輪轉天地總維八方其文髙妙神仙之宗有知其法坐覩真靈能變能化随節練形萬神安備飛行上清宻則神降泄則禍嬰東明通真變景陽霞符春三月行道思神招靈當以黒書青𥿄上東向服之百日通靈千日見神徹視萬里坐覩自然役使青真玉女九人致青宫寳書神仙真文又青書黄繒上安所坐卧席東靣以青錦衣之百日則致青老降座青帝神官侍衛神文營護行符者身九年自致青霞之雲載兆飛行所謂精感神降坐致飛仙者也其文乃東方青景陽霞開明通光之精其炁乃九元之始暉其暉映朗東天欝勃九千九萬九億萬重其精飈飈而翠澄碧雲欝乎太虚華芒爛乎九玄流津澳於豪林之外玉泉注於萬丈之淵林棲碧雞之羣淵治暘谷神王上有始青之觀中有青華之宫觀有九炁元老宫舎青真聖皇左侍青腰玉女右直翠羽靈童常乗太山靈獸䇿御九光神龍以春三月上導九天之炁下引肝府之源流二炁交於感㑹變化在乎湏㬰故結炁以成號凝精以成符得嚥其炁則能立覩神軀有餐其精則能變入九天此妙哉之靈化巍巍乎太虚鍾變萬竒難可且書南光八練丹景四朗符夏三月行道思神招靈當以青書赤𥿄上南向服之百日通靈千日見神萬日飛仙役使太丹玉女八人致流金火鈴登仙丹章又赤書白繒上安所坐卧席南靣以赤錦衣之百日則絳老降房赤帝神官侍衞神文營護行符者身八年則致絳霞之雲載兆飛行上昇洞陽之宫也其文乃南方洞光八練四朗之精其炁乃八天發封之始暉其暉明爓朗映八外煥煥流耀迅電散漫八千八萬八億萬重其精炎炎而丹舒光芒曄曄而𡹃𡼳似慶雲之欝勃煥乎太陽之庭玉津滂沲澳於流火則有不死之人上有南極之臺中有洞陽之宫臺有主仙司命舎太和上真右侍太丹玉女左衛赤圭靈童常集霍山之獸匡御九色鳯皇以夏三月上導九天之炁下引絳府之明梁二炁交於感變靈化發於㣲芒故凝精以成文結炁以成星嚥其炁則致靈尊降房餐其精則能飛行八空駈䇿六甲役召六丁妙化之道位加髙清西精浩靈化景扶希符秋三月行道思神招靈當以黄書白𥿄上西向服之百日通靈千日見神上真下降與神接顔役使太素玉女六人致金精日華冶煉芝英又白書青繒上安所坐卧席西靣以白錦衣之百日白老降旁白帝神官侍衛神文營護行符者身六年則致三素雲軿降載兆身昇形太空飛行玉清其文乃西方浩靈洞練扶帝金魄白門之精其炁乃六演金映之始暉其暉明曜映朗西戎浩浩流布六千六萬六億萬重其精落落如玉瑩光光芒煥煥峩峩𡹃𡼳上无復色下无復淵眇莽浩汗似素雲之沓煙煥乎洞虚金門之上流津澳注冶練之庭冶練則有還容之池練仙芝英金門則有青金丹臺上有龍山神樓中有素靈之宫樓有十二玉仙宫舎西華真人左侍素靈玉女右衞金華之童常乗華山靈獸䇿御白虎之王以秋三月導九天之炁下引肺府中真二炁應變而交㑹變化生乎西關故凝精以成符結炁以成神得嚥其炁則能立降神顔餐其精能飛昇金門嘯命五嶽坐召十方興雲致龍適意所從其文髙妙難可稱焉北玄欝真錬景蕭風符冬三月行道思神招靈當以黒書白𥿄上北向服之百日通靈千日覩真徹視幽㣲與神交顔役使太玄玉女五人致五星上妃夫人靈真昇中玄圖神仙寳文又黒書絳繒上安所坐卧席北面以玄錦衣之百日黒帝降席黒帝神官侍衛神文營護行符者身五年則致玄雲降覆兆身昇形太空飛北辰之中也其文乃北方欝真玄玄蕭風華晨之精其炁乃隂陽始開之始暉其暉混沌乍合乍離五色玄朗洞映欝單分流散漫五千五萬五億萬重其精玄玄而相附似錦雲之沓烟合金花而不曜殖五行而立玄神變明乎朔隂之野流真澳於寒水之郷朔隂則生練仙玉膏寒水則有制魔之王上有七晨華盖中有廣靈之堂華盖䕃於玄斗中真堂舎皇上玉晨右侍太玄玉女左侍玉晨之童常乗常山神獸策御飛龜紫輪以冬三月上導九天之炁下引賢府流泉二炁交於神通變化生乎一旬故凝精以成文結炁以成仙得嚥其炁則致七晨降房盻接靈顔得食其精則能廽化隂陽興雲召龍飛昇華堂覩靈文之妙化天地之原宗也黃上八維生景玉門符四季之時行道招靈當以赤書黄𥿄上向季王服之一百二十日通靈徹視逆知吉㓙千日天真下䧏與神交顔役使黄素玉女十二人致黄上八道交真玄録飛仙鳯衣九天靈章又黄書黒繒之上安所坐卧席中央以黄錦衣之一百日黄老詣房黄帝神官侍衛神文營護行符者身十二年致黄雲降覆兆形玉輿羽輪昇兆飛行上入太玄之宫也其文乃中央黄上坤母玉門生景通明之精其炁乃天地綱維十二辰化之始暉其暉映朗八方其烟飈飈而四飛光明晃晃而通虚欝勃衝於太玄之都維落十二億萬之重華芒爛燿發乎九玄流精溢於四季之郷上有玉京之府中有華盖之宫府有太上道主宫舎玉晨之君左侍飛仙羽節青華玉女右直領仙玉郎金靈神童常乗九號靈獸䇿御玄上黄龍緫五炁以輔辰制命十二勾陳上導九天之源流下引脾府之黄神二炁交扵泥丸之上錬化混合於三丹之房故凝精以變神結炁以鍊仙得嚥其炁黃老降形得餐其精色發金剛身生水火項有圓光變化萬竒飛昇太空此靈文之妙用髙化之難量也此五老秘文蔵於九天之上五靈玉都金華紫房侍文五帝靈童五帝玉華玉女各五十人燒香散花侍衞神文依九天舊格萬刦一傳皆授上仙以成真人凡有玄簡帝圖録字三清應為後聖之人者得覩靈篇修行變化存念思神服御玉文不出九年剋致五老降房天真交顔洞徹幽虚坐在立无變化水火白日昇晨輕泄漏慢殃逮七玄巳身亡命長沒河源服符之時當各随節向王叩齒十二通㣲祝曰天輪地轉四時交真五行導鍊結成玉仙上元凝精中元變神下元育飬逺形反眞三元混合我禀自然靈符充鎮王炁如烟内明外鮮赤子寧安降致飛霞昇入帝軒畢咽炁五過止傳授大籙之法依四極明科七百年内聴三傳百年内有其人聴再傳師弟子對齋百日或七十日弟子賫上金九兩丹地絳錦四十七尺青布二十二尺金龍玉魚各一枚登盟北向告九天而傳弟子披心向天而承受師不依年限而授則身受風刀之考弟子无信而求眞謂輕天寳則身沒河源終不得仙天科告慎明詳奉行上淸元始變化寳眞上經九靈太妙龜山玄籙卷下
