纒寶明齊映落華生煙鎮固上元映照我身三宫保錬六府光津䇿御八景玄老周旋乘空步虛出入無間上輔髙上虛皇帝臣八會慶納請如所陳畢仰咽九氣止此髙上祕道變化混生知者與髙上齊真修之九年飛行玉清輕泄七祖充責身役河源依九天之科不得入仙紫虛髙上元皇道君元明皇之氣諱明上基字飛冥範形長五千萬丈以春三月頭建紫元通天寶冠衣青黃緑三色錦袍佩招真玉䇿帶流光鳯章常乘紫碧二色之雲坐十二色蓮華之上光明暐曄在上清之中紫虛之內思之還長五寸五分夏三月髙上元皇道君則變形色如黃金項負圓輪十二光衣七十二條九綵飛天之衣坐九色師子之上思之還反真形秋三月髙上元皇道君則變形為鳯頭人軀衣九色斑文虎衣坐五色雲上思之還反真形冬三月髙上元皇道君則變形為碧皂黃三色之光更相纒繞在紫虛之中此則反明皇之氣更受錬紫虛之精思之還反真形修行髙上元皇之道當以太歲之日沐浴入室南向心拜三過朝元皇畢還北向叩齒十二通閉眼內思髙上元皇道君隨四時形影在上清金靈宫丹神府元洞鄉通耀里回真下映入兆通神之戶便微祝曰明皇元道髙上紫元三變九合結成洞門朱精爛綺飛生黃雲五符固死保命長存回真混合使我成神三宫安鎮九孔結仙四時變化與帝合真畢仰咽九氣止此髙上祕密之道三變九錬自然成真得行其法九年飛行與神合形輕泄漏慢九祖充責身沒幽泉長謝四極不得入仙上皇玉虛君元紫皇之氣諱明世蘭字曲常清形長三千萬丈以夏三月頭建通精七寶華冠衣九色飛雲錦襡佩丹文紫章常立紫氣之雲七色蓮華光明暐曄洞照上清思之還長三寸三分秋三月上皇玉虛君則變形一靣四眼身為鳯軀九色斕斑在黃白紅三氣之中立五色師子之上思之還反真形冬三月上皇玉虛君則變形為男子手執五色之華衣五色之衣在紫雲芝之上思之還反真形春三月上皇玉虛君則變形為黃赤青三色之光混沌狀如浮雲在紫虛之內此則上皇反玉虛之氣更受錬紫皇之精思之還反真形凡修行玉虛君之道當以八節之日清齋東向三拜朝玉虛畢還北向叩齒三通閉眼內思上虛皇玉君隨四時形影在上清朱精宫生真府太丹鄉三寶里回真下映入兆泥丸後門之中便微祝曰玄明紫皇八氣飛空幽幽冥冥混化十方敷靈演真煥曜金光紫微錬精結成仙容八景騰飛乘雲駕空控轡太虛逍遙上宫畢仰咽七氣止此上皇金匱祕道有名書紫簡刻圖丹臺當得此文修行九年飛行上清輕泄祕要身沒鬼官不得入仙三元太明上皇君元虛皇之氣諱寂欣平字靈劫化形長七千萬丈秋三月頭建丹華紫曜飛天冠衣五色雲羅之袍佩流金火鈴帶神虎玉章常立紫雲之上光明暐曄七十二變照明上清思之還長七寸二分太明上皇君以冬三月則化形人頭龍身五色玄黃在紫虛之上立九色雲光絶空之中思之還反真形太明上皇君以春三月則化形為三月之暉流光爓照上清之中紫虛之內思之還反真形太明上皇君以夏三月則化形為赤白二色之光如太素之雲在紫虛之中此則太明上皇君反三元之氣更受錬虛皇之精思之還反真形修行上皇君之道常以本命太歲之日沐浴入室南向心拜太明上皇君畢還北向叩齒三通閉眼思太明上皇君隨四時形影在上清紫融宫生真府七相鄉六元里中回真下映入兆左方融生宫中便微祝曰三元太明洞景朱靈玄氣散真混合元精帝一變化保命黃寧八氣飛騰六宫常生玄老同符我道已明三光翼景羽服鬱青䇿轡丹輿飛入月庭畢仰咽十二氣止得修此道則名書九天上真降席飛行玉清輕慢泄漏身沒鬼官不得入仙皇上萬始先生元上皇之氣諱幽朗蘭字通大範形長九千萬丈冬三月頭建丹陽日精之冠衣赤雲明光錦袍佩金虎鳯丈帶丹皇紫章常乘白素之雲坐五色師子光明流煥照映上清思之還長二寸一分春三月萬始先生則變形為人軀三頭鳯凰衣九色斑文虎衣常立十二華光思之還反真形夏三月萬始先生則變形為三日之暉紫光八芒爛映煥明在上清之上十二色蓮華之中思之還反真形秋三月萬始先生則化為青赤紫三色之光更相纒繞如日之輪此則反皇上之氣更受錬上皇之精思之還反真形修行萬始先生之道常以本命八節之日沐浴入室北向心拜先生畢叩齒三通閉眼思先生隨四時形影在上清融華宫金魂府明靈鄉上張里中回真下映入兆右方隂極宫中微祝曰萬始三精散氣九微上景登正明道四飛玄母開願八間解懷保録中元帝真徘徊變化三形體無常衰混合光象日月齊暉飛登玄宫升入紫微畢仰咽九氣止此髙玄妙祕黃房寶文得見其篇書名九天修行飛仙白日升天上皇先生紫晨君元髙元之氣諱欣平淵字道元極身長九千萬丈春三月建通天寶晨冠衣七色流明雲光珠袍佩上相制靈之符帶混真東蒙之䇿坐九色蒼龍在青雲之上光明流曜洞照上清思之還化九寸九分夏三月化形龍頭人身五色斑斕文彩煥曜在紫雲之中光明徹照映朗十方思之還反真形秋三月化形人頭龍身九色斑斕文彩光明洞照上清思之還反真形冬三月化形青黑二色之光更相混合光明洞曜映照上清此則反上皇之氣更受錬元髙元之精思之還反真形修行紫晨君之道常以立春之日東向九拜朝紫晨君畢還向叩齒九通思紫晨君隨四時形影在玉清紫玄上宫朱映府金精鄉化靈里中回真下映入兆肝之上門微祝曰上皇散靈紫晨納精三華洞發四度鮮明流真交慶回映我庭三元混合我道以成仙衣羽服錦裳飛青九龍䇿轡飛行上靈仰咽九氣止紫虛皇上太帝君元洞元之氣諱靈明谷字大範宗長八千萬丈夏三月建九氣流精紫曜之冠衣九色無縫自然之襡佩七元交光之章帶元皇命真之䇿坐神鳯之上絳雲之內光明暐曄洞照上清思之還長八寸八分秋三月化形鳯頭人形九色斑斕文彩光明蓮華之上在素雲之中思之還反真形冬三月化形人頭鳯身口銜火鈴文彩煥爛洞照上清思之還反真形春三月化形為青赤二色之光光明赫赫照明上清此則反紫虛之氣更受錬元洞精之精思之還反真形修行太帝君之道常以立夏之日入室南向八拜朝太帝君還北向叩齒九通思太帝君隨四時形影在玉清變雲宫中丹曜府金華鄉日精里中回真下映入兆心房上關微祝曰紫虛吐精皇上納氣二元交慶混合齊契流津濯灌澤灑九外是日上吉我享元泰玉華流溢洗塵掃穢六腑開清身無毫翳明道八景輔成仙位仰咽靈芝還童反艾肉輕骨飛升入無際仰咽八氣止紫虛皇老上帝君元洞精之氣諱虛盈字元衡豁長六千萬丈秋三月建金華七曜之冠衣雲文日精錦袍佩皇天仗幡帶九光靈章綬立素雲之中坐七色師子光明流煥洞映上清思之還長六寸六分冬三月化形虎頭人身黃白錦袍文彩明曜立玄雲之中坐九色靈照十方思之還反真形春三月化形人頭虎身九色斑斕光彩煥煥照明上清在紫虛上清之中思之還反真形夏三月化形為赤白二色之光光明奕奕照明四方此則反紫虛之氣更受錬元洞之精思之還反真形修行上帝君之道常以立秋之日入室西向六拜朝帝君畢還北向叩齒十二通思上帝君隨四時形影在玉清金門宫治精府三錬鄉九變里中回真下映入兆胇宫中節間微祝曰皇老開張四運改靈錬度三關變化飾形是日慶合萬氣交并太上度符司命典生削滅死根勒録上清上享元吉靡不利貞夀同三光與真齊靈得乘飛景上造帝庭畢仰咽十二氣止玄虛太真洞景君元洞融之氣諱遊上飛字玄開梁化五千萬丈冬三月建無上七曜寶冠衣朱玉文明光飛錦襡佩丹皇玉章帶招仙之劒在玄虛之中立五色師子之上光明煥曜映照上清思之還長五寸五分春三月化形為仙人色如金剛項負寶圎衣龜文大衣光照十方在青雲之中思之還反真形夏三月化形為靈龜三百六十文章口銜七星坐華蓋之下玄雲之上光明奕奕照映上清思之還反真形秋三月化形為白黑二色之光光色沌沌如玉之精此則反玄虛之氣更受錬元洞融之精思之還反真形修行洞景君之道常以立冬之日入室北向五拜朝洞景君叩齒三通思洞景君在玉清瓊容宫太丹府朱雀鄉崖中里中回真下映入兆腎府雙闕之內微祝曰洞真髙清四運錬仙道合中元變化自然流津玄灑慶布我身上享元吉利貞受恩太一度符元君科山絶滅死尸斬斷胞根八景輔翼總録萬神降致雲輿運我升晨畢仰咽五氣止行之八年刻得玄升中真降見授兆真經寶章皇上玉帝元髙晨之氣諱大寧字大幽始長三千萬丈春三月建七寶珠冠衣九色虎衣佩金虎鳯文帶神虎玉章乘七元之精立朱雀之上十二華光煥明玉清洞虛之中思之還化三寸三分夏三月化形項負七色寶蓋兩手斗星立日暉之中光明暐曄在上清之上思之還反真形秋三月化形人頭為朱雀口銜日象立紫雲之上華蓋之下光明奕奕映照上清思之還反真形冬三月化形為玄黃蒼三色之光更相纒繞在紫虛之中則玉帝反皇上之氣更受錬髙晨之精思之還反真形修行玉帝之道常以月一日十五日沐浴入室東向心拜朝玉帝畢還北向叩齒十二通閉眼思皇上玉帝隨四時形影在上清洞雲宫霧仙府仙變鄉定微里中回真下映入兆兩眉中間微祝曰明上帝皇騰景髙微九變紫元四氣錬暉三合中宫五化徘徊混合帝一萬氣總歸安靈元室鎮固九扉三部八景齊真相隨共乘雲龍升我髙飛長享帝籍億億不衰仰咽九氣止此皇上之道紫房中祕言授於金名玉字合真之人得者飛仙與帝合形輕泄身死七祖充責萬劫不得入仙太素髙虛上極紫皇君元明晨之氣諱宗梵憐字玄上門化五千萬丈夏三月建天元七寶冠衣九色珠絳雲光錦襡佩六山火玉帶靈飛紫綬立五色師子蓮華之上煥明上清七十四方思之還長五寸二分秋三月化形人頭虎軀玄黃斑文文彩煥爛光照十方在紫氣之中立五芝之上思之還反真形冬三月化形通身金光項負華蓋衣三十二色有如天仙之象光明奕奕照朗上清思之還反真形春三月化形為紫黃緑三色之光更相纏繞三氣混沌在上清之中此則紫皇反太素之氣更受錬明晨之精思之還反真形修行紫皇君之道常以庚申之日清齋入室南向心拜紫皇君畢還北向叩齒三通閉眼思紫皇道君隨四時形影在上清金耀宫紫曜府七元鄉華蓋里中回真下映入兆紫房宫中微祝曰明晨散靈紫皇納暉太素九變四錬洞微太一監命公子保衰帝君理命三元齊回與真并契福祚巍巍策龍飛升上造雲扉畢仰咽九氣止此金房祕要傳上清真人得者飛仙位齊髙真輕泄漏慢身役河源七祖謝責不得入仙虛明紫蘭中元髙嵉君元太晨之氣諱惠智字通大業長三千萬丈秋三月建三華寶冠衣神精七色之袍帶流金紫章佩石精金光之劒立碧霞之上七色虎輦光明煥煥三十二色思之還長三寸三分冬三月化形虎身龍頭五色斑文光明奕奕在碧雲之中五色蓮華之上思之還反真形春三月變形三頭鳯皇九色文彩光明煥爛照映上清思之還反真形夏三月化形為紫碧二色之光更相纏繞如日之升此則髙嵉君紫蘭之氣更受錬元明太晨之精思之還反真形修行中元髙嵉君之道常以立秋之日清齋入室西向拜朝髙嵉君畢還北向叩齒十二通閉眼思髙嵉君隨四時形影在上清靈映宫神變府三輪鄉成真里中回真下映入兆五藏五城之宫微祝曰太晨回景虛明分變合九錬三真輪津靈灌溉五城門鎮神固氣塞死源上招髙虛致仙群飛行羽步升