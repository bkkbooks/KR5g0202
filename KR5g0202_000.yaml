front:
  text: 上清元始變化寶真上經九靈太妙龜山玄籙卷上墳一上清寶書以九天建立之始皆自然而生與氣同存三景齊明表見九天之上太空之中或結飛玄紫氣以成靈文天書宛妙文勢曲折字方一丈難可尋詳自非九天中真王莫能明其旨音九天真王以上虛元年命玄都上真鑄金為簡衆聖明義髙上口訣撰集靈篇玉帝注筆刻簡成章以俯仰之格皆有髙下次第禁限品目悉出髙聖之微旨也封於九天之上大有宫中瓊房之內皆以西華玉女素靈宫金晨紫童典衛之西龜之山一曰龍山乃九天之根紐萬氣之淵府在天西北之角周回四十萬里髙與玉清連界東南則接通陽之霞上承青宫神虎之門西北則交寒穴之野上通金闕神仙之庭南則極於太丹浮黎之鄉氣協洞陽之光北則指於鈎陳交關華蓋氣踐廣靈中央直衝玉京八逹交風山頂平天三萬里悉涌金為牆結玉為門金臺玉樓十二神宫上有自然流精紫闕金華之堂瓊瑶之室傍通九穴之洞自生紫氣之雲交帶鳯文九色落陳崖生紫桂嶺秀瓊林結瑚為條植玉為根騫樹含實赤子白環三華耀葩於朱景反香流芳於太玄八氣扇飊以長執玉籟空唱而成音龍嘷雲樓鳯嘯絶岑毒獸萬羅長蛇千尋神宫堂堂雲仙紛紛巍巍元館觸類吐津蓋元始之妙化實天元之靈根金華之堂北窗上有自生紫氣結成玄文字方一丈垂芒煥明天書宛妙非可尋詳九天丈人昔上甲元年清齋雲宫宴景龜山仍刻金簡繕書玄文解其宿滯演其靈音記曰龜山丹皇飛玄紫文西王母以開皇元年正月上寅之日乘虛汛靈逸遨九霄靜齋龜山上登自然流精紫闕金華瓊堂逰觀北窗朝禮玄文瞻崖思靈心想上真於是妙感玄覺丹心表明時忽有天真大神挾日帶月項負圎光從群仙羽蓋乘飛輿紫雲九精流霄乘跪王母前稱九天鳳宫領仙王姓上玄字開明奉元始天王命使齎九天金書紫字青金丹皇之文降授於王母焉鍚號西元九靈上真仙母封西龜之嶽又授素書一卷上真始生變化元録總領仙籍承統玉清又以青瓊之板給九天鳳衣飛青羽襡晨嬰玉冠鳳雲之舄神鳳紫輪飛行羽蓋二十四乘五色仗幡命靈之節又以上宫金華玉女七百人侍衛於仙母焉使治流精紫闕金華瓊堂一月三登玉清再宴崑崙五校衆仙於是天真大神啓授事畢悉反駕玉宫仙母於是受命登座告齋瓊堂命侍女王子登董雙成等以神光錦巾盛受金書紫字青瓊之板青金丹皇鍚文上真始生變化元録飛玄紫文凡四事封以丹皇之章藏之於瓊瑶之室命金華玉女紫晨玉童各三十人侍衛靈文依三天舊典俯仰之格申告五帝五嶽靈山河海正神咸令一月五條至學人名功過區别隨品奏言仙母常以八節之日又一月五過宴景雲宫時適五嶽歷觀河源逰盻八極當此之時則五星出分日月停光百陽激電流金煥精天丁前驅五老仗幡仙母常乘九色之輦紫雲飛輪從天仙玉女各五千人女則乘鳯男則䇿龍飛仙羽服皆手執華幡笳簫鼓吹百和合音鸞唱鳳嘯激朗雲陳華光交煥三景合明紫童揚香以却穢神妃散華以灌真天鈞奏其旌蓋紫煙翳乎虛庭玉景流盼於太空神化威制於萬靈當此之時六天順命群凶束形祅魔喪眼天朗氣清蓋髙仙之妙觀摽丹皇之洞靈也
