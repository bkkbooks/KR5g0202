萬丈以季月頭建黃晨通天玉冠衣黃錦之袍玄黃飛雲錦裙佩黃神越元之䇿帶靈飛紫綬常立五色師子黃雲之上思之還長三寸三分秋三月白氣玉黃帝君則變形分為四童子衣青白赤黑四色錦裳飛雲錦帔各頭戴日精之華手執五色之幡立素雲之上思之還反真形冬三月黑氣玉黃帝君則變形一身四頭朱鳥毛色斑爛照明北方思之還反真形春三月青氣玉黃帝君則變形為皇上老人通身黃色頭戴圓光如之相輪手執金鈴足立青雲之上思之還反真形夏三月赤氣玉黃帝君則變形為赤光光色憧憧照明南方此則反髙皇之氣更受練元黃生之精思之還反真形修行黃帝君之道常以太歲甲子之日入室向太歲十二拜朝黃帝君畢還北向叩齒十二通思黃帝君隨四時形像在上清黃元宫髙皇府中戊鄉四圎里中回真下降入兆脾府之中便咒曰四剛總真靈化無方道合成一五行開張隨運變號周圓四鄉是日上吉乘隂御陽六甲直符太一下迎結我録籍書名上京得朝三元保仙神皇畢仰咽十二氣止上清元始變化元録髙上玉皇帝上聖君九天玉真皆稟氣自然託形瓊胎隱秀紫元靈和感會得有人焉胤皇流之胄生而成真結空洞以為字合三氣以為名受號帝位應化上清總仙髙虛拊任玄玄四時改易推節變通沐浴冠帶練飾長存運化形影應感而生幽冥恍惚故道無常名深不可測微難可窮天地規以得立太玄協以致清日月持之以朗耀五行稟之以致靈巍巍德宗蕩蕩髙尊其道髙妙非可勝焉元始記籙藏之太上六合宫中紫房之內萬劫一傳九天禁書非鬼神所聞得見其篇目將慶灑上葉福流玄根魂升南宫七祖同歡名書玉札死生獲仙後聖學上真之道當練悉元始變化之形隨節改易以通其真以反其氣以練其神假令元始皇上丈人以立春之日納元玉虛之氣受皇上丈人之號此皆真形衣服正色竟春三月九十日中居真臨正至立夏之日皇上丈人則變其正形更受節化沐浴神真謂變仙易景通真納靈致氣長存周夏三月九十日中仙魂沐浴神真感通至立秋之日皇上丈人則隨節化形冠帶五常謂之仙化氣通玄玄內充外溢光輝發明變真飬氣致氣無窮周秋三月九十日中冠帶九天仙化成真至立冬之日皇上丈人含真胎息反氣自然解脫身形變景入光還其元始受練反精育瑩神真光色混沌如雲之煙周冬三月九十日中結氣凝神還復正形四度回周周而復生此元始四改之化隨節易容天地之運皆有盛衰否泰休息以應天關盛則臨正休則育養冠帶練精不失其常故天地長存無窮此妙化之道非可勝記學真之家當各隨其節修行存思衆真皆如元始皇上丈人之法八年之中不失常節尅致真人下降目覩神形能隨氣變化飛升太空也凡修四變之道當隨節服四變之符假令春三月行道存思當先服東明通真變景陽霞之符夏三月行道當服南光八錬丹景四朗之符秋三月行道當服西精浩靈化景扶希之符冬三月行道當服北玄鬱真練景蕭風之符若行黃帝之道當以季月服黃上八維生景玉門之符此元始變化結真上道行之者則通天氣招神致仙迃降靈顔曲映寢房中理兆形四梵之氣通明五宫開關受真使神安玉府隨節縳仙下和隂陽條理候門輪轉天地總維八方其文髙妙神仙之宗有知其法坐覩真靈能變能化隨節練形萬神安備飛行上清密則神降泄則禍嬰東明通真變景陽霞符春三月行道思神招靈當以黑書青𥿄上東向服之百日通靈千日見神徹視萬里坐覩自然役使青真玉女九人致青宫寶書神仙真文又青書黃繒上安所坐卧席東靣以青錦衣之百日則致青老降座青帝神官侍衛神文營護行符者身九年自致青霞之雲載兆飛行所謂精感神降坐致飛仙者也其文乃東方青景陽霞開明通光之精其氣乃九元之始暉其暉映朗東天鬱勃九千九萬九億萬重其精飈飈而翠澄碧雲鬱乎太虛華芒爛乎九玄流津澳於豪林之外玉泉注於萬丈之淵林棲碧雞之羣淵治暘谷神王上有始青之觀中有青華之宫觀有九氣元老宫舍青真聖皇左侍青腰玉女右直翠羽靈童常乘太山靈獸䇿御九光神龍以春三月上導九天之氣下引肝府之源流二氣交於感會變化在乎須臾故結氣以成號凝精以成符得咽其氣則能立覩神軀有餐其精則能變入九天此妙哉之靈化巍巍乎太虛鍾變萬竒難可且書南光八練丹景四朗符夏三月行道思神招靈當以青書赤𥿄上南向服之百日通靈千日見神萬日飛仙役使太丹玉女八人致流金火鈴登仙丹章又赤書白繒上安所坐卧席南靣以赤錦衣之百日則絳老降房赤帝神官侍衛神文營護行符者身八年則致絳霞之雲載兆飛行上升洞陽之宫也其文乃南方洞光八練四朗之精其氣乃八天發封之始暉其暉明爓朗映八外煥煥流耀迅電散漫八千八萬八億萬重其精炎炎而丹舒光芒曄曄而崚𡼳似慶雲之鬱勃煥乎太陽之庭玉津滂沱澳於流火則有不死之人上有南極之臺中有洞陽之宫臺有主仙司命舍太和上真右侍太丹玉女左衛赤圭靈童常集霍山之獸匡御九色鳯皇以夏三月上導九天之氣下引絳府之明梁二氣交於感變靈化發於微芒故凝精以成文結氣以成星咽其氣則致靈尊降房餐其精則能飛行八空驅䇿六甲役召六丁妙化之道位加髙清西精浩靈化景扶希符秋三月行道思神招靈當以黃書白𥿄上西向服之百日通靈千日見神上真下降與神接顔役使太素玉女六人致金精日華冶煉芝英又白書青繒上安所坐卧席西靣以白錦衣之百日白老降旁白帝神官侍衛神文營護行符者身六年則致三素雲軿降載兆身升形太空飛行玉清其文乃西方浩靈洞練扶帝金魄白門之精其氣乃六演金映之始暉其暉明曜映朗西戎浩浩流布六千六萬六億萬重其精落落如玉瑩光光芒煥煥峩峩崚𡼳上無復色下無復淵眇莽浩汗似素雲之沓煙煥乎洞虛金門之上流津澳注冶練之庭冶練則有還容之池練仙芝英金門則有青金丹臺上有龍山神樓中有素靈之宫樓有十二玉仙宫舍西華真人左侍素靈玉女右衛金華之童常乘華山靈獸䇿御白虎之王以秋三月導九天之氣下引肺府中真二氣應變而交會變化生乎西關故凝精以成符結氣以成神得咽其氣則能立降神顔餐其精能飛升金門嘯命五嶽坐召十方興雲致龍適意所從其文髙妙難可稱焉北玄鬱真錬景蕭風符冬三月行道思神招靈當以黑書白𥿄上北向服之百日通靈千日覩真徹視幽微與神交顔役使太玄玉女五人致五星上妃夫人靈真升中玄圖神仙寶文又黑書絳繒上安所坐卧席北面以玄錦衣之百日黑帝降席黑帝神官侍衛神文營護行符者身五年則致玄雲降覆兆身升形太空飛北辰之中也其文乃北方鬱真玄玄蕭風華晨之精其氣乃隂陽始開之始暉其暉混沌乍合乍離五色玄朗洞映鬱單分流散漫五千五萬五億萬重其精玄玄而相附似錦雲之沓煙合金花而不曜殖五行而立玄神變明乎朔隂之野流真澳於寒水之鄉朔隂則生練仙玉膏寒水則有制魔之王上有七晨華蓋中有廣靈之堂華蓋蔭於玄斗中真堂舍皇上玉晨右侍太玄玉女左侍玉晨之童常乘常山神獸策御飛龜紫輪以冬三月上導九天之氣下引賢府流泉二氣交於神通變化生乎一旬故凝精以成文結氣以成仙得咽其氣則致七晨降房盻接靈顔得食其精則能廽化隂陽興雲召龍飛升華堂覩靈文之妙化天地之原宗也黃上八維生景玉門符四季之時行道招靈當以赤書黃𥿄上向季王服之一百二十日通靈徹視逆知吉凶千日天真下降與神交顔役使黃素玉女十二人致黃上八道交真玄録飛仙鳯衣九天靈章又黃書黑繒之上安所坐卧席中央以黃錦衣之一百日黃老詣房黃帝神官侍衛神文營護行符者身十二年致黃雲降覆兆形玉輿羽輪升兆飛行上入太玄之宫也其文乃中央黃上坤母玉門生景通明之精其氣乃天地綱維十二辰化之始暉其暉映朗八方其煙飈飈而四飛光明晃晃而通虛鬱勃衝於太玄之都維落十二億萬之重華芒爛耀發乎九玄流精溢於四季之鄉上有玉京之府中有華蓋之宫府有太上道主宫舍玉晨之君左侍飛仙羽節青華玉女右直領仙玉郎金靈神童常乘九號靈獸䇿御玄上黃龍總五氣以輔辰制命十二勾陳上導九天之源流下引脾府之黃神二氣交于泥丸之上錬化混合於三丹之房故凝精以變神結氣以鍊仙得咽其氣黃老降形得餐其精色發金剛身生水火項有圓光變化萬竒飛升太空此靈文之妙用髙化之難量也此五老祕文藏於九天之上五靈玉都金華紫房侍文五帝靈童五帝玉華玉女各五十人燒香散花侍衛神文依九天舊格萬劫一傳皆授上仙以成真人凡有玄簡帝圖録字三清應為後聖之人者得覩靈篇修行變化存念思神服御玉文不出九年剋致五老降房天真交顔洞徹幽虛坐在立無變化水火白日升晨輕泄漏慢殃逮七玄巳身亡命長沒河源服符之時當各隨節向王叩齒十二通微祝曰天輪地轉四時交真五行導鍊結成玉仙上元凝精中元變神下元育飬逺形反真三元混合我稟自然靈符充鎮王氣如煙內明外鮮赤子寧安降致飛霞升入帝軒畢咽氣五過止傳授大籙之法依四極明科七百年內聽三傳百年內有其人聽再傳師弟子對齋百日或七十日弟子賫上金九兩丹地絳錦四十七尺青布二十二尺金龍玉魚各一枚登盟北向告九天而傳弟子披心向天而承受師不依年限而授則身受風刀之考弟子無信而求真謂輕天寶則身沒河源終不得仙天科告慎明詳奉行上淸元始變化寶真上經九靈太妙龜山玄籙卷下
