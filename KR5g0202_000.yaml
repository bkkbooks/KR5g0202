成雲文之襡飛仙羽裙腰帶虎書手把金鈴常立七色蓮華之上紫雲之中光明煥煥照明十方思之還長四寸四分春三月八景老君則變形為八光童子八人齊長八寸衣黃錦之帔飛羅之裳生八色之雲光明煥煥照明上清思之還反真形夏三月八景老君則變形為老公頭建黃巾身著五虎衣手把金節佩攝殺之劒在黃氣之中常口引日光思之還反真形秋三月八景老君則變化為黃白紫紅緑玄赤蒼八色之光更相纍沓在上清之上則變上清之氣更受錬元雲源之精思之還反真形修行八景君之道當以秋分之日及本命甲子之日入室西向八拜朝八景君畢還北向叩齒九通思八景君隨四時形像在上清清虛宫洞清府上元鄉紫房里中回真下映入兆少腹二孔之本便咒曰上清玄玄氣八景生一紀黃元協神宗精魂對帝子五符保命籍度年同劫始飛雲八景輿升兆雲門裏身飛入太虛死魂翻然起畢仰八咽止此上清玄祕之道太上藏之金格有得者不死修之飛仙輕泄靈文七祖充責已身亡命負罪幽山東華方諸宫髙晨師玉保王青童君元日精之氣形長七千萬丈春三月頭建青華寶晨冠衣青羽飛裘青錦飛裙腰帶青精通明之劒手執九色魔幡帶神虎之符坐青雲之上紫煙之中思之還長七寸七分夏三月青童君則變形為人身鳥頭通身青羽之衣立五色師子之上手持召仙之䇿在紫雲之中思之還反真形秋三月青童君則變形為青精童子頭戴飛龍口銜火鈴坐玄虛之上常有青雲繞絡身形思之還反真形冬三月青童君則變形為青赤緑三色之光更相繞纒在上清之上青雲之中此則反東華之氣更受錬元日精之精思之還反真形修行青童君之道當以立冬之日及本命庚申丁卯之日入室東向九拜朝青童君畢還北向叩齒十二通思青童君隨四時形像在上清方諸宫青元府通霞鄉東華里中回真下映入兆百關絶節之下咒曰青華混回五道煥分金晨建節受持七門太一保命靈摽理魂陵陽度籍元公召神奉兆登霄寢息玉軒福臻億億慶流千千書名東華世享上仙畢仰咽九氣止此東華玉格上真祕道大劫周天地改易其文當見玉嶽之室得者不死修之得過洪災白日飛騰輕泄七祖充役已身亡命負考河源扶桑大帝九老仙皇君元源谷之氣形長九千萬丈夏三月頭建寶琅晨冠衣亂色百變之袍腰帶飛靈素綬佩豁落七元之劒手執青靈命魔之幡立九色之雲光明煥煥照映上清思之還長九寸九分秋三月九老仙皇君則變形為仙色如金剛項有圎光衣七十二條法衣立三氣蓮花之上光明煥赫洞映上清思之還反真形冬三月九老仙皇君則變形為人頭龍身五色斑爛在紫虛之上碧雲之中思之還反真形春三月九老仙皇君則變形為碧蒼玄三色之光更相纍沓在上清之上此則反扶桑青浩之氣更受錬元源谷之精思之還反真形修行九氣仙皇君之道當以春分之日及本命四月八日入室東北向三拜朝仙皇君畢還北向叩齒二十四通思仙皇君隨四時形像在上清清元宫晹谷府溟涬鄉扶桑里中回真下映入兆本命之根胞胎大浩中便咒曰太帝變景扶晨理元四氣練易百變千分入兆胞胎斬斷死根太一守戶玉真護門拔度三界體寶金仙神津發溢合羽揚輪書札玉位世保福原禍死絶沉更生仙魂七玄同飛升化帝門畢仰咽二氣止此太帝玄祕之文藏於玉房萬劫一行得者長存修之致仙輕泄禍伐沒命河源小有玉真萬華先生主圖玉君元納真之氣形長三千萬丈秋三月頭建逺逰寶冠衣飛仙羽衣帶寶真洞章手執華幡在青雲之中五色師子之上光明奕奕照明上清思之還長三寸三分冬三月主圖玉君則變形為人身鳥口口銜玉符身衣羽衣手執三氣之華光明落落照明上清思之還反真形春三月主圖玉君則變形為人身兩手為鳯翅通身衣黃羽之衣足立七星在紫虛之上思之還反真形夏三月主圖玉君則變形為青黃二色之光如雲之沓在上清之上此則反小有玉真之氣更受錬元納真之精思之還反真形修行主圖玉真君之道當以立秋及本命之日入室西北向一拜朝玉真君畢還北向叩齒十二通思玉真君隨四時形像在上清金雲宫通氣府招搖鄉玉真里中回真下映入兆鼻下人中便咒曰小有結真合精練神大回變化六混七分帝一理命無英保魂七華生朽沉景起煙奉籍帝尊慶拔七玄形合日月三光相連乘羽駕逰升入髙晨畢仰咽三氣止此小有天中金格玉文得者壽同天地修行上為真人妄傳輊露罪及七玄身死負考萬劫不原玄州二十九真伯上帝司禁君元仙演之氣形長五千萬丈冬三月頭建三玄通天寶冠衣九色虎衣班文之裘飛青羽襡腰帶虎書佩流金火鈴在紫虛之上太清之中光明煥煥思之還長五寸五分春三月上帝司禁君則變形為人身獸頭狀麒麟或通身麟形青黃文彩斑斕立三色雲氣之中思之還反真形夏三月上帝司禁君則變形為童子頭戴飛龍身衣紫黃羽襡乘鳯皇在清虛之中或遊宴五嶽手執青無之録思之還反真形秋三月上帝司禁君則變形為百變之光混沌亂色更相纒繞在上清之中此則反玄州二十九真之氣更受錬元仙演之精思之還反真形修行上帝司禁君之道當以立夏之日及秋分甲子日入室東向九拜朝司禁君畢還北向叩齒十二通思司禁君隨四時形像在上清司空宫仙都府玄隂鄉總正里中回真下映入兆隂莖之端便咒曰玄真輔仙上帝監籍神王練氣五雲敷席符命四司檢簡精魄太一授録保兆仙格還童觀容停年止白身飛玄都與天同宅五帝攜提長享玄伯畢仰咽九氣止此玄洲練仙祕道藏之大有之房萬年一出得者仙伯書名長生無極修之飛行上升仙庭輕泄者身死謝罪鬼官太無晨中君元玉戶之氣形長七千萬丈冬三月頭建金華七寶冠衣朱文羽衣